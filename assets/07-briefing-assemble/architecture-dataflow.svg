<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 700" font-family="Microsoft YaHei, PingFang SC, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4B5563"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3B82F6"/>
    </marker>
    <marker id="arrow-teal" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#14B8A6"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="820" height="700" fill="#F8FAFC" rx="8"/>

  <text x="410" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1E293B">Step 07 · Briefing 数据流</text>
  <text x="410" y="54" text-anchor="middle" font-size="11" fill="#64748B">每个 Briefing Agent 读什么 → 提取什么 → 产出什么</text>
  <line x1="80" y1="65" x2="740" y2="65" stroke="#CBD5E1" stroke-width="1"/>

  <!-- ===== LEFT: INPUT FILES ===== -->
  <rect x="30" y="85" width="140" height="170" rx="6" fill="white" stroke="#E2E8F0" stroke-width="1" filter="url(#shadow)"/>
  <text x="40" y="103" font-size="10" font-weight="bold" fill="#334155">📂 输入文件</text>
  <text x="40" y="122" font-size="9" fill="#64748B">capability-graph.json</text>
  <text x="40" y="138" font-size="9" fill="#64748B">summaries/*.json</text>
  <text x="40" y="158" font-size="9" fill="#64748B">schemas.md</text>
  <text x="40" y="174" font-size="9" fill="#64748B">protocol-scheduling.md</text>
  <text x="40" y="194" font-size="9" fill="#64748B">ref-paths.md</text>
  <text x="40" y="238" font-size="8" fill="#94A3B8">全部由 Briefing Agent 自主读取</text>

  <!-- Dash arrows from input to agents -->
  <line x1="170" y1="122" x2="240" y2="130" stroke="#4B5563" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="170" y1="138" x2="240" y2="250" stroke="#4B5563" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="170" y1="158" x2="240" y2="370" stroke="#4B5563" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="170" y1="174" x2="240" y2="490" stroke="#4B5563" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- ===== BRIEFING AGENTS COLUMNS ===== -->
  <!-- Agent 1 -->
  <rect x="240" y="85" width="180" height="130" rx="6" fill="white" stroke="#3B82F6" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="240" y="85" width="180" height="24" rx="6" fill="#DBEAFE"/>
  <text x="330" y="102" text-anchor="middle" font-size="11" font-weight="bold" fill="#1E40AF">Briefing Agent 1</text>
  <text x="330" y="122" text-anchor="middle" font-size="9" fill="#475569">读 capability-graph 命题</text>
  <text x="330" y="136" text-anchor="middle" font-size="9" fill="#475569">读 summaries/*.json</text>
  <text x="330" y="150" text-anchor="middle" font-size="9" fill="#475569">提取 mechanism / bottlenecks</text>
  <text x="330" y="164" text-anchor="middle" font-size="9" fill="#475569">提取 tradeoffs / open questions</text>
  <text x="330" y="178" text-anchor="middle" font-size="9" fill="#475569">组装 Briefing 模板</text>
  <text x="330" y="196" text-anchor="middle" font-size="8.5" fill="#3B82F6" font-weight="bold">→ {seq}-{short_name}.md</text>

  <!-- Agent 2 -->
  <rect x="240" y="227" width="180" height="130" rx="6" fill="white" stroke="#3B82F6" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="240" y="227" width="180" height="24" rx="6" fill="#DBEAFE"/>
  <text x="330" y="244" text-anchor="middle" font-size="11" font-weight="bold" fill="#1E40AF">Briefing Agent 2</text>
  <text x="330" y="264" text-anchor="middle" font-size="9" fill="#475569">读 capability-graph 命题</text>
  <text x="330" y="278" text-anchor="middle" font-size="9" fill="#475569">读 summaries/*.json</text>
  <text x="330" y="292" text-anchor="middle" font-size="9" fill="#475569">提取 mechanism / bottlenecks</text>
  <text x="330" y="306" text-anchor="middle" font-size="9" fill="#475569">提取 tradeoffs / open questions</text>
  <text x="330" y="320" text-anchor="middle" font-size="9" fill="#475569">组装 Briefing 模板</text>
  <text x="330" y="338" text-anchor="middle" font-size="8.5" fill="#3B82F6" font-weight="bold">→ {seq}-{short_name}.md</text>

  <!-- Agent 3 -->
  <rect x="240" y="369" width="180" height="130" rx="6" fill="white" stroke="#3B82F6" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="240" y="369" width="180" height="24" rx="6" fill="#DBEAFE"/>
  <text x="330" y="386" text-anchor="middle" font-size="11" font-weight="bold" fill="#1E40AF">Briefing Agent 3</text>
  <text x="330" y="406" text-anchor="middle" font-size="9" fill="#475569">读 capability-graph 命题</text>
  <text x="330" y="420" text-anchor="middle" font-size="9" fill="#475569">读 summaries/*.json</text>
  <text x="330" y="434" text-anchor="middle" font-size="9" fill="#475569">提取 mechanism / bottlenecks</text>
  <text x="330" y="448" text-anchor="middle" font-size="9" fill="#475569">提取 tradeoffs / open questions</text>
  <text x="330" y="462" text-anchor="middle" font-size="9" fill="#475569">组装 Briefing 模板</text>
  <text x="330" y="480" text-anchor="middle" font-size="8.5" fill="#3B82F6" font-weight="bold">→ {seq}-{short_name}.md</text>

  <!-- Agent N -->
  <rect x="240" y="511" width="180" height="55" rx="6" fill="white" stroke="#93C5FD" stroke-width="1" filter="url(#shadow)"/>
  <text x="330" y="533" text-anchor="middle" font-size="10" font-weight="bold" fill="#1E40AF">… 更多 Agent</text>
  <text x="330" y="552" text-anchor="middle" font-size="9" fill="#64748B">简单窗口 W=5 并发</text>

  <!-- Arrows from agents to outputs -->
  <line x1="420" y1="178" x2="530" y2="320" stroke="#3B82F6" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="420" y1="320" x2="530" y2="330" stroke="#3B82F6" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="420" y1="462" x2="530" y2="340" stroke="#3B82F6" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- ===== RIGHT: OUTPUT ===== -->
  <rect x="530" y="270" width="260" height="150" rx="6" fill="white" stroke="#14B8A6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="530" y="270" width="260" height="26" rx="6" fill="#0F766E"/>
  <text x="660" y="288" text-anchor="middle" font-size="12" font-weight="bold" fill="white">输出文件</text>
  <text x="660" y="315" text-anchor="middle" font-size="10" font-weight="bold" fill="#0F766E">briefings/</text>
  <text x="660" y="335" text-anchor="middle" font-size="9" fill="#475569">01-briefing-xxx.md</text>
  <text x="660" y="353" text-anchor="middle" font-size="9" fill="#475569">02-briefing-yyy.md</text>
  <text x="660" y="371" text-anchor="middle" font-size="9" fill="#475569">03-briefing-zzz.md</text>
  <text x="660" y="389" text-anchor="middle" font-size="9" fill="#475569">…（每命题一份）</text>
  <text x="660" y="405" text-anchor="middle" font-size="8.5" fill="#94A3B8">{workDir}/briefings/</text>

  <!-- Arrow to output -->
  <line x1="420" y1="540" x2="660" y2="420" stroke="#4B5563" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arrow)"/>

  <!-- ===== BOTTOM: KEY PRINCIPLE ===== -->
  <rect x="60" y="610" width="700" height="65" rx="6" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1"/>
  <text x="410" y="632" text-anchor="middle" font-size="11" font-weight="bold" fill="#1E40AF">核心原则</text>
  <text x="410" y="650" text-anchor="middle" font-size="10" fill="#475569">每个 Briefing Agent 自主读取 capability-graph + summaries → 提取关键信息 → 组装 Briefing</text>
  <text x="410" y="666" text-anchor="middle" font-size="9" fill="#64748B">主 agent 不干预 Briefing 内容组装，只负责调度和窗口管理</text>
</svg>