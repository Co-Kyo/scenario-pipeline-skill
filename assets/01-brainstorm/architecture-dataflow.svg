<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 700" font-family="Microsoft YaHei, PingFang SC, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4B5563"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3B82F6"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8B5CF6"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="820" height="700" fill="#F8FAFC" rx="8"/>

  <text x="410" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1E293B">Step 01 · Sub-Agent 数据流</text>
  <text x="410" y="54" text-anchor="middle" font-size="11" fill="#64748B">每个 sub-agent 读什么 → 做什么 → 产出什么</text>
  <line x1="80" y1="65" x2="740" y2="65" stroke="#CBD5E1" stroke-width="1"/>

  <!-- ===== LEFT: INPUT FILES ===== -->
  <rect x="30" y="85" width="140" height="160" rx="6" fill="white" stroke="#E2E8F0" stroke-width="1" filter="url(#shadow)"/>
  <text x="40" y="103" font-size="10" font-weight="bold" fill="#334155">📂 输入文件</text>
  <text x="40" y="122" font-size="9" fill="#64748B">anchors.json</text>
  <text x="40" y="138" font-size="9" fill="#64748B">scenario-agent.md</text>
  <text x="40" y="154" font-size="9" fill="#64748B">technical-agent.md</text>
  <text x="40" y="170" font-size="9" fill="#64748B">learning-agent.md</text>
  <text x="40" y="186" font-size="9" fill="#64748B">constraint-agent.md</text>
  <text x="40" y="202" font-size="9" fill="#64748B">year-granularity.md</text>
  <text x="40" y="218" font-size="9" fill="#64748B">schemas.md§N</text>
  <text x="40" y="238" font-size="8" fill="#94A3B8">全部由 sub-agent 自主读取</text>

  <!-- Arrows from input files to 4 agents -->
  <line x1="170" y1="122" x2="240" y2="130" stroke="#4B5563" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="170" y1="154" x2="240" y2="260" stroke="#4B5563" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="170" y1="170" x2="240" y2="390" stroke="#4B5563" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="170" y1="186" x2="240" y2="520" stroke="#4B5563" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- ===== 4 AGENT COLUMNS ===== -->
  <!-- Agent 1: Scenario -->
  <rect x="240" y="85" width="180" height="120" rx="6" fill="white" stroke="#3B82F6" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="240" y="85" width="180" height="24" rx="6" fill="#DBEAFE"/>
  <text x="330" y="102" text-anchor="middle" font-size="11" font-weight="bold" fill="#1E40AF">场景 Agent</text>
  <text x="330" y="122" text-anchor="middle" font-size="9" fill="#475569">读 scenario-agent.md</text>
  <text x="330" y="136" text-anchor="middle" font-size="9" fill="#475569">从 anchors.json 提取锚点</text>
  <text x="330" y="150" text-anchor="middle" font-size="9" fill="#475569">按年限规则过滤深度</text>
  <text x="330" y="164" text-anchor="middle" font-size="9" fill="#475569">列出面试/实战场景</text>
  <text x="330" y="182" text-anchor="middle" font-size="8.5" fill="#3B82F6" font-weight="bold">→ scenario.json</text>

  <!-- Agent 2: Technical -->
  <rect x="240" y="215" width="180" height="120" rx="6" fill="white" stroke="#8B5CF6" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="240" y="215" width="180" height="24" rx="6" fill="#EDE9FE"/>
  <text x="330" y="232" text-anchor="middle" font-size="11" font-weight="bold" fill="#6D28D9">技术 Agent</text>
  <text x="330" y="252" text-anchor="middle" font-size="9" fill="#475569">读 technical-agent.md</text>
  <text x="330" y="266" text-anchor="middle" font-size="9" fill="#475569">从 anchors.json 提取锚点</text>
  <text x="330" y="280" text-anchor="middle" font-size="9" fill="#475569">拆解为原子能力点</text>
  <text x="330" y="294" text-anchor="middle" font-size="9" fill="#475569">标注依赖关系/fanout</text>
  <text x="330" y="312" text-anchor="middle" font-size="8.5" fill="#8B5CF6" font-weight="bold">→ technical.json</text>

  <!-- Agent 3: Learning -->
  <rect x="240" y="345" width="180" height="120" rx="6" fill="white" stroke="#14B8A6" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="240" y="345" width="180" height="24" rx="6" fill="#CCFBF1"/>
  <text x="330" y="362" text-anchor="middle" font-size="11" font-weight="bold" fill="#0F766E">学习 Agent</text>
  <text x="330" y="382" text-anchor="middle" font-size="9" fill="#475569">读 learning-agent.md</text>
  <text x="330" y="396" text-anchor="middle" font-size="9" fill="#475569">从 anchors.json 提取锚点</text>
  <text x="330" y="410" text-anchor="middle" font-size="9" fill="#475569">构建学习路径</text>
  <text x="330" y="424" text-anchor="middle" font-size="9" fill="#475569">标注战略高地</text>
  <text x="330" y="442" text-anchor="middle" font-size="8.5" fill="#14B8A6" font-weight="bold">→ learning.json</text>

  <!-- Agent 4: Constraint -->
  <rect x="240" y="475" width="180" height="120" rx="6" fill="white" stroke="#EF4444" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="240" y="475" width="180" height="24" rx="6" fill="#FEE2E2"/>
  <text x="330" y="492" text-anchor="middle" font-size="11" font-weight="bold" fill="#B91C1C">约束 Agent</text>
  <text x="330" y="512" text-anchor="middle" font-size="9" fill="#475569">读 constraint-agent.md</text>
  <text x="330" y="526" text-anchor="middle" font-size="9" fill="#475569">从 anchors.json 提取锚点</text>
  <text x="330" y="540" text-anchor="middle" font-size="9" fill="#475569">提取显式/隐式约束</text>
  <text x="330" y="554" text-anchor="middle" font-size="9" fill="#475569">标注排除项 + level_weight</text>
  <text x="330" y="572" text-anchor="middle" font-size="8.5" fill="#EF4444" font-weight="bold">→ constraint.json</text>

  <!-- ===== RIGHT: CONVERGER ===== -->
  <!-- Arrows from 4 agents to converger -->
  <line x1="420" y1="182" x2="500" y2="330" stroke="#3B82F6" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="420" y1="312" x2="500" y2="340" stroke="#8B5CF6" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="420" y1="442" x2="500" y2="350" stroke="#14B8A6" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="420" y1="572" x2="500" y2="360" stroke="#EF4444" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Converger -->
  <rect x="500" y="280" width="290" height="130" rx="6" fill="white" stroke="#8B5CF6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="500" y="280" width="290" height="26" rx="6" fill="#7C3AED"/>
  <text x="645" y="298" text-anchor="middle" font-size="12" font-weight="bold" fill="white">收敛者 Agent</text>
  <text x="645" y="318" text-anchor="middle" font-size="9.5" fill="#475569">读 4 份维度报告 + anchors.json</text>
  <text x="645" y="334" text-anchor="middle" font-size="9.5" fill="#475569">校验 → 对齐 → 收束 → 去重 → 补位 → 图谱构建</text>
  <text x="645" y="350" text-anchor="middle" font-size="9.5" fill="#475569">输出 requirement-web.json</text>
  <text x="645" y="368" text-anchor="middle" font-size="8.5" fill="#94A3B8">读取：scenario.json + technical.json + learning.json + constraint.json + anchors.json</text>
  <text x="645" y="384" text-anchor="middle" font-size="8.5" fill="#94A3B8">+ schemas.md§requirement-web</text>
  <text x="645" y="400" text-anchor="middle" font-size="8.5" fill="#94A3B8">超时 5min · 失败触发降级协议</text>

  <!-- Arrow to output -->
  <line x1="645" y1="410" x2="645" y2="440" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Output -->
  <rect x="530" y="440" width="230" height="40" rx="6" fill="white" stroke="#14B8A6" stroke-width="2" filter="url(#shadow)"/>
  <text x="645" y="458" text-anchor="middle" font-size="11" font-weight="bold" fill="#0F766E">📄 requirement-web.json</text>
  <text x="645" y="474" text-anchor="middle" font-size="9" fill="#64748B">{workDir}/.meta/requirement-web.json</text>

  <!-- ===== BOTTOM: KEY PRINCIPLE ===== -->
  <rect x="60" y="610" width="700" height="60" rx="6" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1"/>
  <text x="410" y="632" text-anchor="middle" font-size="11" font-weight="bold" fill="#1E40AF">核心原则</text>
  <text x="410" y="650" text-anchor="middle" font-size="10" fill="#475569">每个 sub-agent 自主读取文件 → 自主提取元数据 → 自主完成分析 → 自主写入产出</text>
  <text x="410" y="664" text-anchor="middle" font-size="9" fill="#64748B">主 agent 不读取任何 sub-agent 文件，不组装 task 内容，不注入元数据</text>
</svg>
