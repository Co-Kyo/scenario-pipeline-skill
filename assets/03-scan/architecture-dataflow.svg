<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 700" font-family="Microsoft YaHei, PingFang SC, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4B5563"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16A34A"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3B82F6"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8B5CF6"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="820" height="700" fill="#F8FAFC" rx="8"/>

  <text x="410" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1E293B">Step 03 · Sub-Agent 数据流</text>
  <text x="410" y="54" text-anchor="middle" font-size="11" fill="#64748B">每个 sub-agent 读什么 → 做什么 → 产出什么</text>
  <line x1="80" y1="65" x2="740" y2="65" stroke="#CBD5E1" stroke-width="1"/>

  <!-- ===== LEFT: INPUT FILES ===== -->
  <rect x="30" y="85" width="140" height="200" rx="6" fill="white" stroke="#E2E8F0" stroke-width="1" filter="url(#shadow)"/>
  <text x="40" y="103" font-size="10" font-weight="bold" fill="#334155">📂 输入文件</text>
  <line x1="40" y1="108" x2="160" y2="108" stroke="#E2E8F0" stroke-width="0.5"/>
  <text x="40" y="124" font-size="9" fill="#64748B">requirement-web.json</text>
  <text x="40" y="140" font-size="9" fill="#64748B">partition-analysis.json</text>
  <text x="40" y="156" font-size="9" fill="#64748B">ref-sources.md</text>
  <text x="40" y="172" font-size="9" fill="#64748B">strategy-level.md</text>
  <text x="40" y="188" font-size="9" fill="#64748B">protocol-scheduling.md</text>
  <text x="40" y="208" font-size="9" fill="#64748B">schemas.md§03-scan</text>
  <text x="40" y="228" font-size="9" fill="#64748B">anti-crawl-fetch.md</text>
  <text x="40" y="248" font-size="8" fill="#94A3B8">主 agent 读取后内联</text>
  <text x="40" y="262" font-size="8" fill="#94A3B8">到 agent task 中</text>

  <!-- Arrows from input to phases -->
  <line x1="170" y1="140" x2="230" y2="115" stroke="#4B5563" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="170" y1="188" x2="230" y2="155" stroke="#4B5563" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="170" y1="208" x2="230" y2="420" stroke="#4B5563" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="170" y1="228" x2="230" y2="440" stroke="#4B5563" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- ===== PHASE A: Search Agents ===== -->
  <rect x="230" y="85" width="260" height="175" rx="6" fill="white" stroke="#3B82F6" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="230" y="85" width="260" height="24" rx="6" fill="#DBEAFE"/>
  <text x="360" y="102" text-anchor="middle" font-size="11" font-weight="bold" fill="#1E40AF">Phase A：搜索发现 Agent</text>

  <!-- Search agent inner -->
  <rect x="245" y="120" width="110" height="60" rx="4" fill="white" stroke="#93C5FD" stroke-width="1"/>
  <text x="300" y="138" text-anchor="middle" font-size="9" fill="#1E40AF">搜索 Agent 1</text>
  <text x="300" y="153" text-anchor="middle" font-size="8" fill="#475569">read: task (inline)</text>
  <text x="300" y="168" text-anchor="middle" font-size="8" fill="#475569">search → collect URLs</text>

  <rect x="365" y="120" width="110" height="60" rx="4" fill="white" stroke="#93C5FD" stroke-width="1"/>
  <text x="420" y="138" text-anchor="middle" font-size="9" fill="#1E40AF">搜索 Agent 2</text>
  <text x="420" y="153" text-anchor="middle" font-size="8" fill="#475569">read: task (inline)</text>
  <text x="420" y="168" text-anchor="middle" font-size="8" fill="#475569">search → collect URLs</text>

  <text x="360" y="200" text-anchor="middle" font-size="9" stroke="#94A3B8">W=5 · 搜索 Agent 3/4/5 ...</text>
  <text x="360" y="214" text-anchor="middle" font-size="8.5" fill="#475569">T0 域名优先 + 反爬标记 + excluded 过滤</text>

  <!-- Search agent output -->
  <text x="360" y="240" text-anchor="middle" font-size="8.5" fill="#3B82F6" font-weight="bold">→ search-batch.{batch_id}.json（含 urls + tier 分级 + excluded）</text>

  <!-- Arrow from Phase A to Phase B -->
  <line x1="360" y1="260" x2="360" y2="285" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Merge + batch step (main thread, between phases) -->
  <rect x="270" y="285" width="180" height="35" rx="6" fill="white" stroke="#F97316" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="270" y="285" width="180" height="18" rx="6" fill="#FFF7ED"/>
  <text x="360" y="298" text-anchor="middle" font-size="9" font-weight="bold" fill="#C2410C">主线程：A3 merge + A4 分批</text>
  <text x="360" y="314" text-anchor="middle" font-size="8" fill="#475569">url-batches.json + url-batch.*.json</text>

  <line x1="360" y1="320" x2="360" y2="355" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== PHASE B: Extract Agents ===== -->
  <rect x="230" y="355" width="260" height="175" rx="6" fill="white" stroke="#8B5CF6" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="230" y="355" width="260" height="24" rx="6" fill="#EDE9FE"/>
  <text x="360" y="372" text-anchor="middle" font-size="11" font-weight="bold" fill="#6D28D9">Phase B：内容提取 Agent</text>

  <rect x="245" y="390" width="110" height="60" rx="4" fill="white" stroke="#C4B5FD" stroke-width="1"/>
  <text x="300" y="408" text-anchor="middle" font-size="9" fill="#6D28D9">提取 Agent 1</text>
  <text x="300" y="423" text-anchor="middle" font-size="8" fill="#475569">read: url-batch.B1.json</text>
  <text x="300" y="438" text-anchor="middle" font-size="8" fill="#475569">fetch + extract → partial</text>

  <rect x="365" y="390" width="110" height="60" rx="4" fill="white" stroke="#C4B5FD" stroke-width="1"/>
  <text x="420" y="408" text-anchor="middle" font-size="9" fill="#6D28D9">提取 Agent 2</text>
  <text x="420" y="423" text-anchor="middle" font-size="8" fill="#475569">read: url-batch.B2.json</text>
  <text x="420" y="438" text-anchor="middle" font-size="8" fill="#475569">fetch + extract → partial</text>

  <text x="360" y="470" text-anchor="middle" font-size="9" fill="#94A3B8">W=5 · 提取 Agent 3/4/5 ...</text>
  <text x="360" y="484" text-anchor="middle" font-size="8.5" fill="#475569">T0 直接抓取 · 反爬用 Playwright · unknown 自动降级</text>

  <text x="360" y="512" text-anchor="middle" font-size="8.5" fill="#8B5CF6" font-weight="bold">→ partial.{batch_id}.json + B{batch_id}-M*·md</text>

  <!-- Arrow to Phase C -->
  <line x1="360" y1="530" x2="360" y2="560" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== PHASE C: Merge (main thread) ===== -->
  <rect x="230" y="560" width="260" height="85" rx="6" fill="white" stroke="#14B8A6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="230" y="560" width="260" height="22" rx="6" fill="#CCFBF1"/>
  <text x="360" y="576" text-anchor="middle" font-size="11" font-weight="bold" fill="#0F766E">Phase C：合并产出（主线程）</text>

  <text x="360" y="598" text-anchor="middle" font-size="9" fill="#475569">C1. 合并 partial → C2. 域名分级汇总</text>
  <text x="360" y="614" text-anchor="middle" font-size="9" fill="#475569">C3. 多源交叉比较 → C4. 动态信源注册</text>
  <text x="360" y="630" text-anchor="middle" font-size="9" fill="#475569">C5. 写入最终 index.json</text>

  <!-- Arrow to output -->
  <line x1="490" y1="602" x2="550" y2="602" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== RIGHT: OUTPUT ===== -->
  <rect x="550" y="85" width="240" height="250" rx="6" fill="white" stroke="#E2E8F0" stroke-width="1" filter="url(#shadow)"/>
  <text x="560" y="103" font-size="10" font-weight="bold" fill="#334155">📄 中间产出</text>
  <line x1="560" y1="108" x2="780" y2="108" stroke="#E2E8F0" stroke-width="0.5"/>
  <text x="560" y="126" font-size="8.5" fill="#64748B">search-batch.*.json</text>
  <text x="560" y="142" font-size="8.5" fill="#64748B">url-batches.json</text>
  <text x="560" y="158" font-size="8.5" fill="#64748B">url-batch.*.json</text>
  <text x="560" y="174" font-size="8.5" fill="#64748B">partial.*.json</text>
  <text x="560" y="190" font-size="8.5" fill="#64748B">B{batch_id}-M*·md</text>
  <text x="560" y="210" font-size="8.5" fill="#64748B">cross-comparison.md</text>
  <text x="560" y="226" font-size="8.5" fill="#64748B">dynamic-sources.json</text>
  <text x="560" y="246" font-size="7.5" fill="#94A3B8">全部位于 {workDir}/.meta/</text>
  <text x="560" y="260" font-size="7.5" fill="#94A3B8">  .raw-materials/ 目录</text>

  <!-- Final output -->
  <rect x="550" y="355" width="240" height="50" rx="6" fill="white" stroke="#14B8A6" stroke-width="2" filter="url(#shadow)"/>
  <text x="670" y="375" text-anchor="middle" font-size="11" font-weight="bold" fill="#0F766E">📄 最终产出</text>
  <text x="670" y="393" text-anchor="middle" font-size="9" fill="#64748B">.raw-materials/index.json</text>

  <!-- ===== BOTTOM: KEY PRINCIPLE ===== -->
  <rect x="60" y="655" width="700" height="38" rx="6" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1"/>
  <text x="410" y="670" text-anchor="middle" font-size="11" font-weight="bold" fill="#1E40AF">核心原则</text>
  <text x="410" y="685" text-anchor="middle" font-size="9.5" fill="#475569">3-phase pipeline：搜索 Agent → 提取 Agent → 主线程 merge · 主 agent 只做编排不读 sub-agent 产出</text>
</svg>
