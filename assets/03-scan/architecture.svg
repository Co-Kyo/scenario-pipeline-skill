<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 1050" font-family="Microsoft YaHei, PingFang SC, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4B5563"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16A34A"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#DC2626"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#EA580C"/>
    </marker>
    <linearGradient id="grad-blue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#2563EB;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="grad-teal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#14B8A6;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0D9488;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="grad-purple" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <filter id="shadow-lg" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="2" dy="3" stdDeviation="5" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="750" height="1050" fill="#F8FAFC" rx="8"/>

  <!-- Title -->
  <text x="375" y="42" text-anchor="middle" font-size="20" font-weight="bold" fill="#1E293B">Step 03 · 广域扫描 — 架构流程图</text>

  <!-- INPUT: partition-analysis.json -->
  <rect x="50" y="70" width="250" height="48" rx="8" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="175" y="92" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E40AF">INPUT</text>
  <text x="175" y="110" text-anchor="middle" font-size="11" fill="#1E293B">partition-analysis.json (Step 02)</text>

  <!-- INPUT: requirement-web.json -->
  <rect x="430" y="70" width="270" height="48" rx="8" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="565" y="92" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E40AF">INPUT</text>
  <text x="565" y="110" text-anchor="middle" font-size="11" fill="#1E293B">requirement-web.json</text>

  <!-- Arrows down -->
  <line x1="175" y1="118" x2="175" y2="145" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="565" y1="118" x2="375" y2="145" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== Phase A Container ===== -->
  <rect x="30" y="145" width="690" height="340" rx="12" fill="#FFF7ED" stroke="#EA580C" stroke-width="1.5" stroke-dasharray="8,4" filter="url(#shadow)"/>
  <text x="375" y="168" text-anchor="middle" font-size="14" font-weight="bold" fill="#C2410C">Phase A：串行搜索</text>

  <!-- A0: 环境检查 -->
  <rect x="130" y="180" width="240" height="48" rx="8" fill="white" stroke="#EA580C" stroke-width="2" filter="url(#shadow)"/>
  <text x="250" y="200" text-anchor="middle" font-size="12" font-weight="bold" fill="#C2410C">A0 环境检查 + Playwright</text>
  <text x="250" y="218" text-anchor="middle" font-size="10" fill="#6B7280">安装确认 + 用户决策</text>

  <!-- Arrow -->
  <line x1="250" y1="228" x2="250" y2="255" stroke="#EA580C" stroke-width="1.5" marker-end="url(#arrow-orange)"/>

  <!-- A1: 读取密度参数 + 分批 -->
  <rect x="130" y="255" width="240" height="48" rx="8" fill="white" stroke="#EA580C" stroke-width="2" filter="url(#shadow)"/>
  <text x="250" y="275" text-anchor="middle" font-size="12" font-weight="bold" fill="#C2410C">A1 读取密度参数 + 分批</text>
  <text x="250" y="293" text-anchor="middle" font-size="10" fill="#6B7280">策略表查表 → 每命题搜索计划</text>

  <!-- Arrow -->
  <line x1="250" y1="303" x2="250" y2="330" stroke="#EA580C" stroke-width="1.5" marker-end="url(#arrow-orange)"/>

  <!-- A2: 并行 spawn 搜索 agents (dashed container) -->
  <rect x="90" y="330" width="320" height="115" rx="8" fill="#FED7AA" stroke="#FB923C" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="250" y="350" text-anchor="middle" font-size="11" font-weight="bold" fill="#C2410C">A2 并行 spawn 搜索 agents</text>

  <!-- Agent 1 -->
  <rect x="105" y="360" width="90" height="35" rx="5" fill="white" stroke="#FB923C" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="150" y="375" text-anchor="middle" font-size="9" fill="#9A3412">search-B1</text>
  <text x="150" y="388" text-anchor="middle" font-size="8" fill="#6B7280">5min 超时</text>

  <!-- Agent 2 -->
  <rect x="210" y="360" width="90" height="35" rx="5" fill="white" stroke="#FB923C" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="255" y="375" text-anchor="middle" font-size="9" fill="#9A3412">search-B2</text>
  <text x="255" y="388" text-anchor="middle" font-size="8" fill="#6B7280">5min 超时</text>

  <!-- Agent 3 -->
  <rect x="315" y="360" width="80" height="35" rx="5" fill="white" stroke="#FB923C" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="355" y="375" text-anchor="middle" font-size="9" fill="#9A3412">search-B3</text>
  <text x="355" y="388" text-anchor="middle" font-size="8" fill="#6B7280">5min 超时</text>

  <!-- Parallel arrows in -->
  <line x1="190" y1="330" x2="150" y2="360" stroke="#FB923C" stroke-width="1" marker-end="url(#arrow-orange)"/>
  <line x1="250" y1="330" x2="255" y2="360" stroke="#FB923C" stroke-width="1" marker-end="url(#arrow-orange)"/>
  <line x1="310" y1="330" x2="355" y2="360" stroke="#FB923C" stroke-width="1" marker-end="url(#arrow-orange)"/>

  <!-- Agent outputs -->
  <text x="150" y="415" text-anchor="middle" font-size="8" fill="#6B7280">search-batch.B1.json</text>
  <text x="255" y="415" text-anchor="middle" font-size="8" fill="#6B7280">search-batch.B2.json</text>
  <text x="355" y="415" text-anchor="middle" font-size="8" fill="#6B7280">search-batch.B3.json</text>

  <!-- Arrows out -->
  <line x1="150" y1="418" x2="250" y2="450" stroke="#FB923C" stroke-width="1" marker-end="url(#arrow-orange)"/>
  <line x1="255" y1="418" x2="250" y2="450" stroke="#FB923C" stroke-width="1" marker-end="url(#arrow-orange)"/>
  <line x1="355" y1="418" x2="250" y2="450" stroke="#FB923C" stroke-width="1" marker-end="url(#arrow-orange)"/>

  <!-- A3: merge URL list -->
  <rect x="130" y="450" width="240" height="30" rx="5" fill="white" stroke="#EA580C" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="250" y="470" text-anchor="middle" font-size="10" font-weight="bold" fill="#C2410C">A3 merge URL 列表（去重）</text>

  <!-- ===== Phase A output arrow ===== -->
  <line x1="250" y1="485" x2="250" y2="500" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- A4: URL 分级 + 分批 -->
  <rect x="130" y="500" width="240" height="35" rx="8" fill="white" stroke="#EA580C" stroke-width="2" filter="url(#shadow)"/>
  <text x="250" y="522" text-anchor="middle" font-size="11" font-weight="bold" fill="#C2410C">A4 URL 分级 + 分批 → url-batches.json</text>

  <!-- Phase A summary -->
  <rect x="420" y="180" width="280" height="75" rx="8" fill="white" stroke="#E2E8F0" stroke-width="1" filter="url(#shadow)"/>
  <text x="560" y="200" text-anchor="middle" font-size="11" font-weight="bold" fill="#374151">Phase A 产出摘要</text>
  <line x1="440" y1="208" x2="680" y2="208" stroke="#E2E8F0" stroke-width="1"/>
  <text x="440" y="225" font-size="10" fill="#4B5563">• search-batch.{batch_id}.json</text>
  <text x="440" y="242" font-size="10" fill="#4B5563">• URL 分级：T0 / anti-crawl / unknown</text>

  <!-- ===== Phase B Container ===== -->
  <rect x="30" y="530" width="690" height="280" rx="12" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="1.5" stroke-dasharray="8,4" filter="url(#shadow)"/>
  <text x="375" y="553" text-anchor="middle" font-size="14" font-weight="bold" fill="#6D28D9">Phase B：并行提取</text>

  <!-- B1: 组装 agent task -->
  <rect x="130" y="565" width="240" height="40" rx="8" fill="white" stroke="#8B5CF6" stroke-width="2" filter="url(#shadow)"/>
  <text x="250" y="590" text-anchor="middle" font-size="12" font-weight="bold" fill="#6D28D9">B1 组装 agent task</text>

  <!-- Arrow -->
  <line x1="250" y1="605" x2="250" y2="625" stroke="#8B5CF6" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- B2: 并行 spawn 提取 agents (dashed container) -->
  <rect x="90" y="625" width="320" height="115" rx="8" fill="#EDE9FE" stroke="#A78BFA" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="250" y="645" text-anchor="middle" font-size="11" font-weight="bold" fill="#6D28D9">B2 并行 spawn 提取 agents</text>

  <!-- Extract Agent 1 -->
  <rect x="105" y="655" width="90" height="35" rx="5" fill="white" stroke="#A78BFA" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="150" y="670" text-anchor="middle" font-size="9" fill="#6D28D9">extract-B1</text>
  <text x="150" y="683" text-anchor="middle" font-size="8" fill="#6B7280">10min 超时</text>

  <!-- Extract Agent 2 -->
  <rect x="210" y="655" width="90" height="35" rx="5" fill="white" stroke="#A78BFA" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="255" y="670" text-anchor="middle" font-size="9" fill="#6D28D9">extract-B2</text>
  <text x="255" y="683" text-anchor="middle" font-size="8" fill="#6B7280">10min 超时</text>

  <!-- Extract Agent 3 -->
  <rect x="315" y="655" width="80" height="35" rx="5" fill="white" stroke="#A78BFA" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="355" y="670" text-anchor="middle" font-size="9" fill="#6D28D9">extract-B3</text>
  <text x="355" y="683" text-anchor="middle" font-size="8" fill="#6B7280">10min 超时</text>

  <!-- Parallel arrows in -->
  <line x1="190" y1="625" x2="150" y2="655" stroke="#A78BFA" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="250" y1="625" x2="255" y2="655" stroke="#A78BFA" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="310" y1="625" x2="355" y2="655" stroke="#A78BFA" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Agent outputs -->
  <text x="150" y="710" text-anchor="middle" font-size="8" fill="#6B7280">partial.B1.json</text>
  <text x="255" y="710" text-anchor="middle" font-size="8" fill="#6B7280">partial.B2.json</text>
  <text x="355" y="710" text-anchor="middle" font-size="8" fill="#6B7280">partial.B3.json</text>

  <!-- Arrows out -->
  <line x1="150" y1="713" x2="250" y2="740" stroke="#A78BFA" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="255" y1="713" x2="250" y2="740" stroke="#A78BFA" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="355" y1="713" x2="250" y2="740" stroke="#A78BFA" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- B2 task detail: content extraction -->
  <rect x="420" y="565" width="280" height="100" rx="8" fill="white" stroke="#E2E8F0" stroke-width="1" filter="url(#shadow)"/>
  <text x="560" y="585" text-anchor="middle" font-size="11" font-weight="bold" fill="#374151">提取 agent 任务</text>
  <line x1="440" y1="593" x2="680" y2="593" stroke="#E2E8F0" stroke-width="1"/>
  <text x="440" y="610" font-size="10" fill="#4B5563">• 按 tier 分流抓取策略</text>
  <text x="440" y="628" font-size="10" fill="#4B5563">• T0 直抓 / anti-crawl → Playwright</text>
  <text x="440" y="646" font-size="10" fill="#4B5563">• 提取：key_concepts, capability_points</text>
  <text x="440" y="664" font-size="10" fill="#4B5563">• 输出：partial.{batch}.json + .md</text>

  <!-- ===== Phase C Container ===== -->
  <rect x="30" y="810" width="690" height="140" rx="12" fill="#ECFDF5" stroke="#16A34A" stroke-width="1.5" stroke-dasharray="8,4" filter="url(#shadow)"/>
  <text x="375" y="833" text-anchor="middle" font-size="14" font-weight="bold" fill="#15803D">Phase C：主线程 merge</text>

  <!-- C1: 合并 partial index -->
  <rect x="90" y="845" width="180" height="35" rx="8" fill="white" stroke="#16A34A" stroke-width="2" filter="url(#shadow)"/>
  <text x="180" y="867" text-anchor="middle" font-size="11" font-weight="bold" fill="#15803D">C1 合并 partial index</text>

  <!-- Arrow -->
  <line x1="270" y1="862" x2="310" y2="862" stroke="#16A34A" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- C2: 域名分级 -->
  <rect x="310" y="845" width="140" height="35" rx="8" fill="white" stroke="#16A34A" stroke-width="2" filter="url(#shadow)"/>
  <text x="380" y="867" text-anchor="middle" font-size="11" font-weight="bold" fill="#15803D">C2 域名分级</text>

  <!-- Arrow -->
  <line x1="450" y1="862" x2="490" y2="862" stroke="#16A34A" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- C3: 交叉比较 -->
  <rect x="490" y="845" width="200" height="35" rx="8" fill="white" stroke="#16A34A" stroke-width="2" filter="url(#shadow)"/>
  <text x="590" y="867" text-anchor="middle" font-size="11" font-weight="bold" fill="#15803D">C3 多源交叉比较</text>

  <!-- C5 arrow out -->
  <line x1="180" y1="880" x2="180" y2="910" stroke="#16A34A" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- ===== OUTPUT ===== -->
  <rect x="50" y="910" width="250" height="48" rx="8" fill="#CCFBF1" stroke="#14B8A6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="175" y="932" text-anchor="middle" font-size="12" font-weight="bold" fill="#0F766E">OUTPUT</text>
  <text x="175" y="950" text-anchor="middle" font-size="11" fill="#1E293B">.raw-materials/ (index.json + .md)</text>

  <!-- C4: 动态信源 -->
  <rect x="430" y="910" width="250" height="48" rx="8" fill="#CCFBF1" stroke="#14B8A6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="555" y="932" text-anchor="middle" font-size="12" font-weight="bold" fill="#0F766E">OUTPUT</text>
  <text x="555" y="950" text-anchor="middle" font-size="11" fill="#1E293B">dynamic-sources.json + cross-comparison.md</text>

  <!-- Arrow to checkpoint -->
  <line x1="175" y1="958" x2="175" y2="985" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Barrier 3 Checkpoint -->
  <rect x="130" y="985" width="240" height="50" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2" filter="url(#shadow)"/>
  <text x="250" y="1007" text-anchor="middle" font-size="13" font-weight="bold" fill="#92400E">Barrier 3</text>
  <text x="250" y="1025" text-anchor="middle" font-size="10" fill="#92400E">检查点 → 信源质量确认</text>

  <!-- ===== Side Panel: Key Files ===== -->
  <rect x="530" y="810" width="180" height="120" rx="8" fill="white" stroke="#E2E8F0" stroke-width="1" filter="url(#shadow)"/>
  <text x="620" y="832" text-anchor="middle" font-size="11" font-weight="bold" fill="#374151">关键文件</text>
  <line x1="545" y1="840" x2="695" y2="840" stroke="#E2E8F0" stroke-width="1"/>
  <text x="545" y="858" font-size="9" fill="#4B5563">• schemas.md</text>
  <text x="545" y="875" font-size="9" fill="#4B5563">• anti-crawl-fetch.md</text>
  <text x="545" y="892" font-size="9" fill="#4B5563">• ref-sources.md</text>
  <text x="545" y="909" font-size="9" fill="#4B5563">• protocol-scheduling.md</text>

  <!-- ===== Side Panel: Timeout Params ===== -->
  <rect x="530" y="935" width="180" height="100" rx="8" fill="white" stroke="#E2E8F0" stroke-width="1" filter="url(#shadow)"/>
  <text x="620" y="957" text-anchor="middle" font-size="11" font-weight="bold" fill="#374151">调度参数</text>
  <line x1="545" y1="965" x2="695" y2="965" stroke="#E2E8F0" stroke-width="1"/>
  <text x="545" y="983" font-size="9" fill="#4B5563">W = min(5, 批次数)</text>
  <text x="545" y="1000" font-size="9" fill="#4B5563">搜索超时: 5 min</text>
  <text x="545" y="1017" font-size="9" fill="#4B5563">提取超时: 10 min</text>
  <text x="545" y="1034" font-size="9" fill="#4B5563">槽位替换: 简单窗口</text>
</svg>