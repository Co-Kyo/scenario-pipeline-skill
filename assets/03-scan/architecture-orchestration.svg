<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 750" font-family="Microsoft YaHei, PingFang SC, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4B5563"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16A34A"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3B82F6"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8B5CF6"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="600" height="750" fill="#F8FAFC" rx="8"/>

  <!-- Title -->
  <text x="300" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1E293B">Step 03 · 主 Agent 编排流程</text>
  <text x="300" y="54" text-anchor="middle" font-size="11" fill="#64748B">3-phase pipeline：并行搜索 → 并行提取 → 合并产出</text>
  <line x1="80" y1="65" x2="520" y2="65" stroke="#CBD5E1" stroke-width="1"/>

  <!-- Phase A label -->
  <rect x="50" y="90" width="30" height="264" rx="4" fill="#FFF7ED" stroke="#FDBA74" stroke-width="1"/>
  <text x="65" y="232" text-anchor="middle" font-size="10" font-weight="bold" fill="#C2410C" transform="rotate(-90,65,232)">Phase A：并行搜索</text>

  <!-- A0 -->
  <rect x="100" y="90" width="240" height="36" rx="6" fill="white" stroke="#F97316" stroke-width="2" filter="url(#shadow)"/>
  <text x="220" y="113" text-anchor="middle" font-size="11" font-weight="bold" fill="#C2410C">A0. 环境检查 + 用户确认</text>
  <line x1="220" y1="126" x2="220" y2="142" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- A1 -->
  <rect x="100" y="142" width="240" height="36" rx="6" fill="white" stroke="#F97316" stroke-width="2" filter="url(#shadow)"/>
  <text x="220" y="165" text-anchor="middle" font-size="11" font-weight="bold" fill="#C2410C">A1. 读取密度参数 + 命题分批</text>
  <line x1="220" y1="178" x2="220" y2="198" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- A2: Spawn search agents -->
  <rect x="90" y="198" width="260" height="60" rx="6" fill="white" stroke="#3B82F6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="90" y="198" width="260" height="22" rx="6" fill="#DBEAFE"/>
  <text x="220" y="214" text-anchor="middle" font-size="11" font-weight="bold" fill="#1E40AF">② 并行 spawn 搜索 agent</text>
  <text x="220" y="237" text-anchor="middle" font-size="9.5" fill="#475569">W=5 · 滚动窗口 · label: search-{batch_id}</text>
  <text x="220" y="252" text-anchor="middle" font-size="9.5" fill="#475569">超时 5min · 查 strategy-level 密度参数</text>
  <line x1="220" y1="258" x2="220" y2="278" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- A3 -->
  <rect x="100" y="278" width="240" height="36" rx="6" fill="white" stroke="#F97316" stroke-width="2" filter="url(#shadow)"/>
  <text x="220" y="301" text-anchor="middle" font-size="11" font-weight="bold" fill="#C2410C">A3. merge URL 列表（去重）</text>
  <line x1="220" y1="314" x2="220" y2="334" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- A4 -->
  <rect x="100" y="334" width="240" height="36" rx="6" fill="white" stroke="#F97316" stroke-width="2" filter="url(#shadow)"/>
  <text x="220" y="357" text-anchor="middle" font-size="11" font-weight="bold" fill="#C2410C">A4. URL 分级 + 分批</text>
  <line x1="220" y1="370" x2="220" y2="395" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Phase B label -->
  <rect x="50" y="400" width="30" height="136" rx="4" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1"/>
  <text x="65" y="478" text-anchor="middle" font-size="10" font-weight="bold" fill="#1E40AF" transform="rotate(-90,65,478)">Phase B：并行提取</text>

  <!-- B1 -->
  <rect x="100" y="400" width="240" height="36" rx="6" fill="white" stroke="#F97316" stroke-width="2" filter="url(#shadow)"/>
  <text x="220" y="423" text-anchor="middle" font-size="11" font-weight="bold" fill="#C2410C">B1. 组装 agent task</text>
  <line x1="220" y1="436" x2="220" y2="456" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- B2: Spawn extract agents -->
  <rect x="90" y="456" width="260" height="65" rx="6" fill="white" stroke="#3B82F6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="90" y="456" width="260" height="22" rx="6" fill="#DBEAFE"/>
  <text x="220" y="472" text-anchor="middle" font-size="11" font-weight="bold" fill="#1E40AF">⑤ 并行 spawn 提取 agent</text>
  <text x="220" y="496" text-anchor="middle" font-size="9.5" fill="#475569">W=5 · 滚动窗口 · label: extract-{batch_id}</text>
  <text x="220" y="512" text-anchor="middle" font-size="9.5" fill="#475569">读 url-batch.* → 抓取 → 结构化提取</text>
  <line x1="220" y1="521" x2="220" y2="550" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Phase C label -->
  <rect x="50" y="555" width="30" height="84" rx="4" fill="#CCFBF1" stroke="#5EEAD4" stroke-width="1"/>
  <text x="65" y="605" text-anchor="middle" font-size="10" font-weight="bold" fill="#0F766E" transform="rotate(-90,65,605)">Phase C：合并产出</text>

  <!-- C1-C5 -->
  <rect x="90" y="555" width="260" height="84" rx="6" fill="white" stroke="#14B8A6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="90" y="555" width="260" height="22" rx="6" fill="#CCFBF1"/>
  <text x="220" y="571" text-anchor="middle" font-size="11" font-weight="bold" fill="#0F766E">⑥ Phase C 合并产出</text>
  <text x="220" y="595" text-anchor="middle" font-size="9" fill="#475569">C1. 合并 partial index</text>
  <text x="220" y="611" text-anchor="middle" font-size="9" fill="#475569">C2. 域名分级汇总 → C3. 多源交叉比较</text>
  <text x="220" y="627" text-anchor="middle" font-size="9" fill="#475569">C4. 动态信源注册 → C5. 写入 index.json</text>
  <line x1="220" y1="639" x2="220" y2="658" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Barrier -->
  <rect x="100" y="658" width="240" height="45" rx="6" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="220" y="679" text-anchor="middle" font-size="12" font-weight="bold" fill="#92400E">🛑 Barrier 3 检查点</text>
  <text x="220" y="695" text-anchor="middle" font-size="9.5" fill="#B45309">展示信源质量摘要 · clarify 等待确认</text>

  <!-- Right side: what main agent reads -->
  <rect x="430" y="90" width="155" height="175" rx="6" fill="white" stroke="#E2E8F0" stroke-width="1" filter="url(#shadow)"/>
  <text x="440" y="108" font-size="10" font-weight="bold" fill="#334155">主 agent 读取</text>
  <line x1="440" y1="112" x2="572" y2="112" stroke="#E2E8F0" stroke-width="0.5"/>
  <text x="440" y="128" font-size="8.5" fill="#64748B">protocol-scheduling.md</text>
  <text x="440" y="144" font-size="8.5" fill="#64748B">ref-sources.md</text>
  <text x="440" y="160" font-size="8.5" fill="#64748B">strategy-level.md</text>
  <text x="440" y="180" font-size="8.5" fill="#64748B">requirement-web.json*</text>
  <text x="440" y="196" font-size="8.5" fill="#64748B">partition-analysis.json*</text>
  <text x="440" y="216" font-size="7.5" fill="#94A3B8">* 可选（Step 01/02 产出）</text>
  <text x="440" y="230" font-size="7.5" fill="#94A3B8">  不存在时走降级逻辑</text>
  <text x="440" y="250" font-size="7.5" fill="#94A3B8">读完后内联到 agent task</text>
  <text x="440" y="262" font-size="7.5" fill="#94A3B8">不传给 sub-agent 文件路径</text>

  <!-- Right side: what main agent does NOT read -->
  <rect x="430" y="280" width="155" height="105" rx="6" fill="#FEF2F2" stroke="#FECACA" stroke-width="1" filter="url(#shadow)"/>
  <text x="440" y="298" font-size="9.5" font-weight="bold" fill="#DC2626">⛔ 禁止读取</text>
  <line x1="440" y1="304" x2="572" y2="304" stroke="#FECACA" stroke-width="0.5"/>
  <text x="440" y="320" font-size="8" fill="#991B1B">search-batch.*.json</text>
  <text x="440" y="336" font-size="8" fill="#991B1B">url-batch.*.json</text>
  <text x="440" y="352" font-size="8" fill="#991B1B">partial.*.json</text>
  <text x="440" y="368" font-size="8" fill="#991B1B">*.md（素材文件）</text>
  <text x="440" y="384" font-size="7" fill="#991B1B">sub-agent 自主读写</text>

  <!-- Bottom: note -->
  <rect x="60" y="712" width="480" height="30" rx="6" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1"/>
  <text x="300" y="727" text-anchor="middle" font-size="10" font-weight="bold" fill="#166534">3-phase pipeline：A 搜索发现 → B 内容提取 → C 合并产出 · Barrier 3 在 index.json 写入后触发</text>
</svg>
