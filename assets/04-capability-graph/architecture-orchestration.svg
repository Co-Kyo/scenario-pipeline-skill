<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 750" font-family="Microsoft YaHei, PingFang SC, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4B5563"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16A34A"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3B82F6"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8B5CF6"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="600" height="750" fill="#F8FAFC" rx="8"/>

  <!-- Title -->
  <text x="300" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1E293B">Step 04 · 能力图谱构建编排</text>
  <text x="300" y="54" text-anchor="middle" font-size="11" fill="#64748B">单 Agent 顺序执行，无 sub-agent 分发</text>
  <line x1="80" y1="65" x2="520" y2="65" stroke="#CBD5E1" stroke-width="1"/>

  <!-- Step 1 -->
  <rect x="180" y="85" width="240" height="40" rx="6" fill="white" stroke="#F97316" stroke-width="2" filter="url(#shadow)"/>
  <text x="300" y="110" text-anchor="middle" font-size="12" font-weight="bold" fill="#C2410C">① 提取能力雏形</text>
  <line x1="300" y1="125" x2="300" y2="150" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 2 -->
  <rect x="130" y="150" width="340" height="55" rx="6" fill="white" stroke="#3B82F6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="130" y="150" width="340" height="24" rx="6" fill="#DBEAFE"/>
  <text x="300" y="167" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E40AF">② 跨命题去重与合并</text>
  <text x="300" y="188" text-anchor="middle" font-size="10" fill="#475569">名称+层级匹配 → 内容语义比对</text>
  <text x="300" y="202" text-anchor="middle" font-size="9" fill="#94A3B8">记录 merge_trace / split_trace</text>
  <line x1="300" y1="205" x2="300" y2="230" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 3 -->
  <rect x="130" y="230" width="340" height="55" rx="6" fill="white" stroke="#3B82F6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="130" y="230" width="340" height="24" rx="6" fill="#DBEAFE"/>
  <text x="300" y="247" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E40AF">③ 标注依赖关系</text>
  <text x="300" y="268" text-anchor="middle" font-size="10" fill="#475569">技术层级 → 内容引用 → covers交集</text>
  <text x="300" y="282" text-anchor="middle" font-size="9" fill="#94A3B8">按优先级推断依赖</text>
  <line x1="300" y1="285" x2="300" y2="310" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 4 -->
  <rect x="130" y="310" width="340" height="55" rx="6" fill="white" stroke="#3B82F6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="130" y="310" width="340" height="24" rx="6" fill="#DBEAFE"/>
  <text x="300" y="327" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E40AF">④ 限定词注入分析</text>
  <text x="300" y="348" text-anchor="middle" font-size="10" fill="#475569">分析不同限定词注入的特化能力集</text>
  <text x="300" y="362" text-anchor="middle" font-size="9" fill="#94A3B8">补充 qualifier 字段</text>
  <line x1="300" y1="365" x2="300" y2="390" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 5 -->
  <rect x="130" y="390" width="340" height="55" rx="6" fill="white" stroke="#3B82F6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="130" y="390" width="340" height="24" rx="6" fill="#DBEAFE"/>
  <text x="300" y="407" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E40AF">⑤ 信源URL预查找</text>
  <text x="300" y="428" text-anchor="middle" font-size="10" fill="#475569">先复用 Step 03 scan 产物 → 再补搜</text>
  <text x="300" y="442" text-anchor="middle" font-size="9" fill="#94A3B8">T0/T1定向 + 自由搜索+分级</text>
  <line x1="300" y1="445" x2="300" y2="470" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 6 -->
  <rect x="130" y="470" width="340" height="55" rx="6" fill="white" stroke="#8B5CF6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="130" y="470" width="340" height="24" rx="6" fill="#EDE9FE"/>
  <text x="300" y="487" text-anchor="middle" font-size="12" font-weight="bold" fill="#6D28D9">⑥ 战略高地识别</text>
  <text x="300" y="508" text-anchor="middle" font-size="10" fill="#475569">strategic_value = fanout × (1/coupling)</text>
  <text x="300" y="522" text-anchor="middle" font-size="9" fill="#94A3B8">分级: Level 1 / 2 / 3</text>
  <line x1="300" y1="525" x2="300" y2="555" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 7 -->
  <rect x="155" y="555" width="290" height="45" rx="6" fill="white" stroke="#14B8A6" stroke-width="2" filter="url(#shadow)"/>
  <text x="300" y="575" text-anchor="middle" font-size="12" font-weight="bold" fill="#0F766E">⑦ 写入 capability-graph.json</text>
  <text x="300" y="592" text-anchor="middle" font-size="9.5" fill="#64748B">{workDir}/.meta/capability-graph.json</text>
  <line x1="300" y1="600" x2="300" y2="625" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Barrier 4 -->
  <rect x="155" y="625" width="290" height="45" rx="6" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="300" y="646" text-anchor="middle" font-size="12" font-weight="bold" fill="#92400E">🛑 Barrier 4 检查点（强制停顿）</text>
  <text x="300" y="664" text-anchor="middle" font-size="10" fill="#B45309">确认能力图谱完整性 · 等待用户决策</text>

  <!-- Right side: files read -->
  <rect x="430" y="85" width="155" height="135" rx="6" fill="white" stroke="#E2E8F0" stroke-width="1" filter="url(#shadow)"/>
  <text x="440" y="103" font-size="10" font-weight="bold" fill="#334155">Agent 读取 5 个文件</text>
  <text x="440" y="120" font-size="8.5" fill="#64748B">method.md</text>
  <text x="440" y="134" font-size="8.5" fill="#64748B">schemas.md</text>
  <text x="440" y="148" font-size="8.5" fill="#64748B">ref-sources.md</text>
  <text x="440" y="162" font-size="8.5" fill="#64748B">requirement-web.json</text>
  <text x="440" y="176" font-size="8.5" fill="#64748B">raw-materials index + *.md</text>
  <text x="440" y="195" font-size="7.5" fill="#94A3B8">不读 sub-agent 文件</text>

  <!-- Bottom: checkpoint note -->
  <rect x="60" y="685" width="480" height="45" rx="6" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1"/>
  <text x="300" y="703" text-anchor="middle" font-size="10" font-weight="bold" fill="#166534">单 Agent 顺序执行 7 个步骤 → Barrier 4 等待用户确认</text>
  <text x="300" y="719" text-anchor="middle" font-size="9" fill="#15803D">无 sub-agent 分发，全部在当前上下文完成</text>
</svg>
