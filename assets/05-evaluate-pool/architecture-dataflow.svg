<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 700" font-family="Microsoft YaHei, PingFang SC, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4B5563"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16A34A"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#EA580C"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#DC2626"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3B82F6"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8B5CF6"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="820" height="700" fill="#F8FAFC" rx="8"/>

  <text x="410" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1E293B">Step 05 · 评估与入池数据流</text>
  <text x="410" y="54" text-anchor="middle" font-size="11" fill="#64748B">3 个输入 → 四维打分 → 阈值适配 → 难度评估 → 入池 → 3 个产出</text>
  <line x1="80" y1="65" x2="740" y2="65" stroke="#CBD5E1" stroke-width="1"/>

  <!-- ===== INPUT FILES (left) ===== -->
  <rect x="20" y="90" width="150" height="180" rx="6" fill="white" stroke="#E2E8F0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="95" y="110" text-anchor="middle" font-size="11" font-weight="bold" fill="#334155">📂 输入文件</text>

  <rect x="30" y="120" width="130" height="38" rx="4" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1"/>
  <text x="95" y="137" text-anchor="middle" font-size="8.5" fill="#1E40AF" font-weight="bold">requirement-web.json</text>
  <text x="95" y="152" text-anchor="middle" font-size="7.5" fill="#3B82F6">Step 01 · 命题+能力雏形</text>

  <rect x="30" y="165" width="130" height="38" rx="4" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1"/>
  <text x="95" y="182" text-anchor="middle" font-size="8.5" fill="#1E40AF" font-weight="bold">capability-graph.json</text>
  <text x="95" y="197" text-anchor="middle" font-size="7.5" fill="#3B82F6">Step 04 · 能力+高地+路径</text>

  <rect x="30" y="210" width="130" height="38" rx="4" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1"/>
  <text x="95" y="227" text-anchor="middle" font-size="8.5" fill="#1E40AF" font-weight="bold">raw-materials</text>
  <text x="95" y="242" text-anchor="middle" font-size="7.5" fill="#3B82F6">Step 03 · index.json</text>

  <!-- Arrow: inputs to step 1 -->
  <line x1="170" y1="180" x2="200" y2="180" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== STEP 1: 4-dimension scoring ===== -->
  <rect x="205" y="95" width="195" height="95" rx="6" fill="white" stroke="#8B5CF6" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="205" y="95" width="195" height="24" rx="6" fill="#EDE9FE"/>
  <text x="302" y="112" text-anchor="middle" font-size="11" font-weight="bold" fill="#6D28D9">① 四维打分</text>
  <text x="248" y="136" font-size="9" fill="#6B7280">跨栈耦合  1-3</text>
  <text x="248" y="151" font-size="9" fill="#6B7280">文档真空  1-3</text>
  <text x="358" y="136" font-size="9" fill="#6B7280">经验壁垒  1-3</text>
  <text x="358" y="151" font-size="9" fill="#6B7280">时事热度  1-3</text>
  <text x="302" y="178" text-anchor="middle" font-size="8.5" fill="#8B5CF6">总分 4-12</text>

  <line x1="400" y1="142" x2="435" y2="142" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== STEP 2: Year threshold ===== -->
  <rect x="440" y="95" width="175" height="95" rx="6" fill="white" stroke="#F59E0B" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="440" y="95" width="175" height="24" rx="6" fill="#FEF3C7"/>
  <text x="527" y="112" text-anchor="middle" font-size="11" font-weight="bold" fill="#B45309">② 年限阈值适配</text>
  <text x="527" y="138" text-anchor="middle" font-size="9" fill="#6B7280">L1 不入池</text>
  <text x="527" y="154" text-anchor="middle" font-size="9" fill="#6B7280">L2 ≥ 6 | L3 ≥ 5</text>
  <text x="527" y="170" text-anchor="middle" font-size="9" fill="#6B7280">L4 任维度≥2 → 入池</text>

  <line x1="615" y1="142" x2="650" y2="142" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== DECISION DIAMOND ===== -->
  <polygon points="715,105 765,142 715,180 665,142" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2" filter="url(#shadow)"/>
  <text x="715" y="140" text-anchor="middle" font-size="9" font-weight="bold" fill="#92400E">通过</text>
  <text x="715" y="152" text-anchor="middle" font-size="7.5" fill="#92400E">阈值?</text>

  <!-- Rejection branch -->
  <line x1="715" y1="180" x2="715" y2="215" stroke="#DC2626" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <rect x="680" y="215" width="70" height="28" rx="4" fill="#FEE2E2" stroke="#DC2626" stroke-width="1"/>
  <text x="715" y="233" text-anchor="middle" font-size="9" font-weight="bold" fill="#B91C1C">拒绝</text>

  <!-- Pass branch -->
  <line x1="665" y1="142" x2="540" y2="255" stroke="#16A34A" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- ===== STEP 3: Difficulty assessment ===== -->
  <rect x="320" y="255" width="200" height="75" rx="6" fill="white" stroke="#8B5CF6" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="320" y="255" width="200" height="24" rx="6" fill="#EDE9FE"/>
  <text x="420" y="272" text-anchor="middle" font-size="11" font-weight="bold" fill="#6D28D9">③ 学习难度评估</text>
  <text x="420" y="295" text-anchor="middle" font-size="9" fill="#6B7280">依赖链深度 + 耦合度 + 抽象度</text>
  <text x="420" y="316" text-anchor="middle" font-size="8.5" fill="#8B5CF6">评级: low / medium / high</text>

  <line x1="520" y1="292" x2="555" y2="292" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== STEP 4: Archive ===== -->
  <rect x="560" y="255" width="200" height="75" rx="6" fill="white" stroke="#14B8A6" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="560" y="255" width="200" height="24" rx="6" fill="#CCFBF1"/>
  <text x="660" y="272" text-anchor="middle" font-size="11" font-weight="bold" fill="#0F766E">④ 入池归档</text>
  <text x="660" y="295" text-anchor="middle" font-size="9" fill="#6B7280">写入导航 + 候选池 + 图谱</text>
  <text x="660" y="316" text-anchor="middle" font-size="8.5" fill="#0D9488">3 个产出文件</text>

  <!-- Arrow down to outputs -->
  <line x1="660" y1="330" x2="660" y2="365" stroke="#16A34A" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- ===== OUTPUTS ===== -->
  <rect x="35" y="365" width="750" height="65" rx="6" fill="white" stroke="#14B8A6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="410" y="388" text-anchor="middle" font-size="11" font-weight="bold" fill="#0F766E">📄 3 个产出文件</text>

  <rect x="80" y="398" width="200" height="24" rx="4" fill="#CCFBF1" stroke="#14B8A6" stroke-width="1"/>
  <text x="180" y="415" text-anchor="middle" font-size="9" font-weight="bold" fill="#0F766E">evaluations.json</text>

  <rect x="310" y="398" width="200" height="24" rx="4" fill="#CCFBF1" stroke="#14B8A6" stroke-width="1"/>
  <text x="410" y="415" text-anchor="middle" font-size="9" font-weight="bold" fill="#0F766E">README.md</text>

  <rect x="540" y="398" width="200" height="24" rx="4" fill="#CCFBF1" stroke="#14B8A6" stroke-width="1"/>
  <text x="640" y="415" text-anchor="middle" font-size="9" font-weight="bold" fill="#0F766E">candidates.md</text>

  <!-- Arrow from step 4 to outputs -->
  <line x1="660" y1="330" x2="660" y2="365" stroke="#16A34A" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- ===== BOTTOM: KEY PRINCIPLE ===== -->
  <rect x="60" y="470" width="700" height="60" rx="6" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1"/>
  <text x="410" y="492" text-anchor="middle" font-size="11" font-weight="bold" fill="#166534">核心原则</text>
  <text x="410" y="510" text-anchor="middle" font-size="10" fill="#475569">单 Agent 读取 3 个跨步骤输入 → 打分 → 阈值筛选 → 难度评级 → 入池归档</text>
  <text x="410" y="524" text-anchor="middle" font-size="9" fill="#64748B">四维: 跨栈耦合·文档真空·经验壁垒·时事热度 | 阈值: L2≥6 / L3≥5 / L4一票入池 | 难度: low/medium/high</text>
</svg>
