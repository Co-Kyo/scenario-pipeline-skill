<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 750" font-family="Microsoft YaHei, PingFang SC, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4B5563"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#EA580C"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="600" height="750" fill="#F8FAFC" rx="8"/>

  <!-- Title -->
  <text x="300" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1E293B">Step 05 · 评估与入池编排</text>
  <text x="300" y="54" text-anchor="middle" font-size="11" fill="#64748B">单 Agent 顺序执行，无 sub-agent 分发</text>
  <line x1="80" y1="65" x2="520" y2="65" stroke="#CBD5E1" stroke-width="1"/>

  <!-- Step 1 -->
  <rect x="130" y="85" width="340" height="65" rx="6" fill="white" stroke="#F97316" stroke-width="2" filter="url(#shadow)"/>
  <rect x="130" y="85" width="340" height="24" rx="6" fill="#FFEDD5"/>
  <text x="300" y="102" text-anchor="middle" font-size="12" font-weight="bold" fill="#C2410C">① 逐命题四维打分</text>
  <text x="300" y="125" text-anchor="middle" font-size="10" fill="#475569">跨栈耦合 · 文档真空 · 经验壁垒 · 时事热度</text>
  <text x="300" y="140" text-anchor="middle" font-size="9" fill="#94A3B8">每维度 1-3 分，总分 4-12</text>
  <line x1="300" y1="150" x2="300" y2="180" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 2 -->
  <rect x="130" y="180" width="340" height="65" rx="6" fill="white" stroke="#3B82F6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="130" y="180" width="340" height="24" rx="6" fill="#DBEAFE"/>
  <text x="300" y="197" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E40AF">② 年限阈值适配</text>
  <text x="300" y="220" text-anchor="middle" font-size="10" fill="#475569">根据 year_level 调整入池门槛</text>
  <text x="300" y="235" text-anchor="middle" font-size="9" fill="#94A3B8">L1:不入池 | L2:≥6 | L3:≥5 | L4:一票入池</text>
  <line x1="300" y1="245" x2="300" y2="275" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 3 -->
  <rect x="130" y="275" width="340" height="65" rx="6" fill="white" stroke="#8B5CF6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="130" y="275" width="340" height="24" rx="6" fill="#EDE9FE"/>
  <text x="300" y="292" text-anchor="middle" font-size="12" font-weight="bold" fill="#6D28D9">③ 学习难度评估</text>
  <text x="300" y="315" text-anchor="middle" font-size="10" fill="#475569">依赖链深度 + 耦合度 + 抽象度</text>
  <text x="300" y="330" text-anchor="middle" font-size="9" fill="#94A3B8">评级: low / medium / high</text>
  <line x1="300" y1="340" x2="300" y2="370" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 4 -->
  <rect x="130" y="370" width="340" height="65" rx="6" fill="white" stroke="#14B8A6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="130" y="370" width="340" height="24" rx="6" fill="#CCFBF1"/>
  <text x="300" y="387" text-anchor="middle" font-size="12" font-weight="bold" fill="#0F766E">④ 入池归档</text>
  <text x="300" y="410" text-anchor="middle" font-size="10" fill="#475569">写入总览导航 + 候选池 + 更新图谱</text>
  <text x="300" y="425" text-anchor="middle" font-size="9" fill="#94A3B8">evaluations.json · README.md · candidates.md</text>
  <line x1="300" y1="435" x2="300" y2="465" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Triple output boxes -->
  <rect x="155" y="465" width="290" height="80" rx="6" fill="white" stroke="#14B8A6" stroke-width="2" filter="url(#shadow)"/>
  <text x="300" y="488" text-anchor="middle" font-size="12" font-weight="bold" fill="#0F766E">写入 3 个产出文件</text>
  
  <rect x="165" y="497" width="82" height="30" rx="4" fill="white" stroke="#14B8A6" stroke-width="1"/>
  <text x="206" y="516" text-anchor="middle" font-size="8.5" fill="#0F766E">evaluations.json</text>

  <rect x="259" y="497" width="82" height="30" rx="4" fill="white" stroke="#14B8A6" stroke-width="1"/>
  <text x="300" y="516" text-anchor="middle" font-size="8.5" fill="#0F766E">README.md</text>

  <rect x="353" y="497" width="82" height="30" rx="4" fill="white" stroke="#14B8A6" stroke-width="1"/>
  <text x="394" y="516" text-anchor="middle" font-size="8.5" fill="#0F766E">candidates.md</text>

  <line x1="300" y1="545" x2="300" y2="575" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Barrier 5 -->
  <rect x="155" y="575" width="290" height="45" rx="6" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="300" y="596" text-anchor="middle" font-size="12" font-weight="bold" fill="#92400E">🛑 Barrier 5 检查点（强制停顿）</text>
  <text x="300" y="614" text-anchor="middle" font-size="10" fill="#B45309">确认评估结果与入池列表 · 等待用户决策</text>

  <!-- Right side: method/schemas -->
  <rect x="430" y="85" width="155" height="95" rx="6" fill="white" stroke="#E2E8F0" stroke-width="1" filter="url(#shadow)"/>
  <text x="440" y="103" font-size="10" font-weight="bold" fill="#334155">方法 / 格式</text>
  <text x="440" y="120" font-size="8.5" fill="#64748B">method.md</text>
  <text x="440" y="134" font-size="8.5" fill="#64748B">schemas.md</text>
  <text x="440" y="148" font-size="8.5" fill="#64748B">ref-sources.md</text>
  <text x="440" y="165" font-size="7.5" fill="#94A3B8">评估矩阵方法</text>

  <!-- Right side: cross-step inputs -->
  <rect x="430" y="195" width="155" height="95" rx="6" fill="white" stroke="#E2E8F0" stroke-width="1" filter="url(#shadow)"/>
  <text x="440" y="213" font-size="10" font-weight="bold" fill="#334155">跨步骤输入</text>
  <text x="440" y="230" font-size="8.5" fill="#64748B">requirement-web.json</text>
  <text x="440" y="244" font-size="8.5" fill="#64748B">capability-graph.json</text>
  <text x="440" y="258" font-size="8.5" fill="#64748B">raw-materials index.json</text>
  <text x="440" y="275" font-size="7.5" fill="#94A3B8">Step 01 / 04 / 03</text>

  <!-- Bottom: checkpoint note -->
  <rect x="60" y="640" width="480" height="45" rx="6" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1"/>
  <text x="300" y="658" text-anchor="middle" font-size="10" font-weight="bold" fill="#166534">单 Agent 顺序执行 4 个步骤 → Barrier 5 等待用户确认</text>
  <text x="300" y="674" text-anchor="middle" font-size="9" fill="#15803D">读取 3 个跨步骤文件 + 方法文件，产出 3 个归档文件</text>
</svg>
