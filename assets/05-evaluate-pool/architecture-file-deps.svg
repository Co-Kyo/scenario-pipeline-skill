<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 600" font-family="Microsoft YaHei, PingFang SC, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4B5563"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16A34A"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3B82F6"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8B5CF6"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="820" height="600" fill="#F8FAFC" rx="8"/>

  <text x="410" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1E293B">Step 05 · 文件依赖图</text>
  <text x="410" y="54" text-anchor="middle" font-size="11" fill="#64748B">单 Agent — 读取 3 个跨步骤输入 + 方法文件，产出 3 个归档文件</text>
  <line x1="80" y1="65" x2="740" y2="65" stroke="#CBD5E1" stroke-width="1"/>

  <!-- ===== TOP: Agent reads (method + schemas) ===== -->
  <rect x="200" y="85" width="420" height="85" rx="6" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="410" y="105" text-anchor="middle" font-size="11" font-weight="bold" fill="#166534">Agent 读取的方法 / 格式文件</text>

  <rect x="220" y="118" width="170" height="28" rx="4" fill="white" stroke="#86EFAC" stroke-width="1"/>
  <text x="305" y="136" text-anchor="middle" font-size="9" fill="#166534">method.md</text>

  <rect x="410" y="118" width="170" height="28" rx="4" fill="white" stroke="#86EFAC" stroke-width="1"/>
  <text x="495" y="136" text-anchor="middle" font-size="9" fill="#166534">schemas.md</text>

  <rect x="220" y="140" width="360" height="22" rx="4" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="400" y="155" text-anchor="middle" font-size="8" fill="#15803D">定义四维评估矩阵方法 + 输出格式</text>

  <!-- Dashed divider -->
  <line x1="100" y1="185" x2="720" y2="185" stroke="#CBD5E1" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="410" y="200" text-anchor="middle" font-size="9" fill="#94A3B8">— 读取边界 — 以下为跨步骤输入文件 —</text>

  <!-- ===== BOTTOM: Cross-step input files ===== -->
  <rect x="100" y="220" width="620" height="130" rx="6" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="410" y="240" text-anchor="middle" font-size="11" font-weight="bold" fill="#1E40AF">跨步骤输入文件（3 个）</text>

  <rect x="130" y="255" width="180" height="35" rx="4" fill="white" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="220" y="272" text-anchor="middle" font-size="9" font-weight="bold" fill="#1E40AF">requirement-web.json</text>
  <text x="220" y="285" text-anchor="middle" font-size="7.5" fill="#3B82F6">Step 01 产出</text>

  <rect x="320" y="255" width="180" height="35" rx="4" fill="white" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="410" y="272" text-anchor="middle" font-size="9" font-weight="bold" fill="#1E40AF">capability-graph.json</text>
  <text x="410" y="285" text-anchor="middle" font-size="7.5" fill="#3B82F6">Step 04 产出</text>

  <rect x="510" y="255" width="180" height="35" rx="4" fill="white" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="600" y="272" text-anchor="middle" font-size="9" font-weight="bold" fill="#1E40AF">raw-materials index.json</text>
  <text x="600" y="285" text-anchor="middle" font-size="7.5" fill="#3B82F6">Step 03 产出</text>

  <!-- Arrows from inputs to agent -->
  <line x1="220" y1="290" x2="340" y2="325" stroke="#3B82F6" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="410" y1="290" x2="410" y2="325" stroke="#3B82F6" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="600" y1="290" x2="480" y2="325" stroke="#3B82F6" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Agent box -->
  <rect x="310" y="325" width="200" height="55" rx="8" fill="white" stroke="#8B5CF6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="310" y="325" width="200" height="24" rx="8" fill="#EDE9FE"/>
  <text x="410" y="342" text-anchor="middle" font-size="11" font-weight="bold" fill="#6D28D9">单 Agent</text>
  <text x="410" y="365" text-anchor="middle" font-size="9" fill="#475569">读 5 文件 → 4 步评估 → 3 个产出</text>

  <!-- Arrows from agent to outputs -->
  <line x1="360" y1="380" x2="240" y2="415" stroke="#14B8A6" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="410" y1="380" x2="410" y2="415" stroke="#14B8A6" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="460" y1="380" x2="580" y2="415" stroke="#14B8A6" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Output files -->
  <rect x="100" y="415" width="620" height="55" rx="6" fill="#CCFBF1" stroke="#14B8A6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="410" y="436" text-anchor="middle" font-size="11" font-weight="bold" fill="#0D9488">📄 产出文件（3 个）</text>

  <rect x="115" y="435" width="185" height="26" rx="4" fill="white" stroke="#14B8A6" stroke-width="1"/>
  <text x="207" y="453" text-anchor="middle" font-size="8.5" fill="#0F766E" font-weight="bold">evaluations.json</text>

  <rect x="317" y="435" width="185" height="26" rx="4" fill="white" stroke="#14B8A6" stroke-width="1"/>
  <text x="409" y="453" text-anchor="middle" font-size="8.5" fill="#0F766E" font-weight="bold">README.md</text>

  <rect x="520" y="435" width="185" height="26" rx="4" fill="white" stroke="#14B8A6" stroke-width="1"/>
  <text x="612" y="453" text-anchor="middle" font-size="8.5" fill="#0F766E" font-weight="bold">candidates.md</text>

  <!-- Legend -->
  <rect x="100" y="495" width="620" height="50" rx="6" fill="#FFF7ED" stroke="#FDBA74" stroke-width="1"/>
  <text x="110" y="515" font-size="10" font-weight="bold" fill="#9A3412">边界规则</text>
  <text x="110" y="533" font-size="9" fill="#9A3412">Agent 只读绿框方法文件 + 蓝框跨步骤输入。产出 3 个文件到 {workDir}/.meta/evaluate-pool/。</text>
</svg>
