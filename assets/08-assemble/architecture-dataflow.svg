<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 700" font-family="Microsoft YaHei, PingFang SC, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4B5563"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16A34A"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3B82F6"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8B5CF6"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="820" height="700" fill="#F8FAFC" rx="8"/>

  <text x="410" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1E293B">Step 08 · Sub-Agent 数据流</text>
  <text x="410" y="54" text-anchor="middle" font-size="11" fill="#64748B">每个 sub-agent 读什么 → 做什么 → 产出什么</text>
  <line x1="80" y1="65" x2="740" y2="65" stroke="#CBD5E1" stroke-width="1"/>

  <!-- ===== LEFT: INPUT FILES ===== -->
  <rect x="30" y="85" width="140" height="170" rx="6" fill="white" stroke="#E2E8F0" stroke-width="1" filter="url(#shadow)"/>
  <text x="40" y="103" font-size="10" font-weight="bold" fill="#334155">📂 输入文件</text>
  <text x="40" y="122" font-size="9" fill="#64748B">capability-graph.json</text>
  <text x="40" y="138" font-size="9" fill="#64748B">briefings/*.md</text>
  <text x="40" y="154" font-size="9" fill="#64748B">schemas.md§assemble</text>
  <text x="40" y="170" font-size="9" fill="#64748B">protocol-scheduling.md</text>
  <text x="40" y="186" font-size="9" fill="#64748B">ref-sources.md</text>
  <text x="40" y="202" font-size="9" fill="#64748B">task 模板（主 agent 分发）</text>
  <text x="40" y="230" font-size="8" fill="#94A3B8">briefings 由 sub-agent 自主读取</text>
  <text x="40" y="244" font-size="8" fill="#94A3B8">task 已内联全部指令</text>

  <!-- Arrows from input to agents -->
  <line x1="170" y1="138" x2="240" y2="130" stroke="#4B5563" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="170" y1="170" x2="240" y2="380" stroke="#4B5563" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- ===== CENTER: TWO PARALLEL TRACKS ===== -->

  <!-- Proposition header -->
  <rect x="240" y="85" width="480" height="30" rx="6" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="1"/>
  <text x="480" y="105" text-anchor="middle" font-size="12" font-weight="bold" fill="#6D28D9">命题 {seq}-{short_name} · 2 个并行 Agent</text>

  <!-- ===== MARKDOWN AGENT (left track) ===== -->
  <rect x="240" y="130" width="230" height="220" rx="6" fill="white" stroke="#8B5CF6" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="240" y="130" width="230" height="26" rx="6" fill="#EDE9FE"/>
  <text x="355" y="148" text-anchor="middle" font-size="11" font-weight="bold" fill="#6D28D9">Markdown Agent</text>
  <text x="355" y="168" text-anchor="middle" font-size="9" fill="#475569">asm-md-{seq}-{short_name}</text>
  <line x1="255" y1="178" x2="455" y2="178" stroke="#E2E8F0" stroke-width="0.5"/>

  <text x="255" y="196" font-size="10" font-weight="bold" fill="#6D28D9">读取</text>
  <text x="255" y="212" font-size="9" fill="#475569">{workDir}/.meta/briefings/</text>
  <text x="255" y="226" font-size="9" fill="#475569">{seq}-{short_name}.md</text>

  <line x1="255" y1="236" x2="455" y2="236" stroke="#E2E8F0" stroke-width="0.5"/>

  <text x="255" y="254" font-size="10" font-weight="bold" fill="#6D28D9">产出</text>
  <text x="255" y="272" font-size="9" fill="#475569">① overview.md（链路编排）</text>
  <text x="255" y="288" font-size="9" fill="#475569">② edge-cases.md（坑点）</text>
  <text x="255" y="304" font-size="9" fill="#475569">③ trade-offs.md（方案对比）</text>
  <text x="255" y="320" font-size="9" fill="#475569">④ references.md（参考汇总）</text>
  <text x="355" y="342" text-anchor="middle" font-size="8.5" fill="#8B5CF6" font-weight="bold">→ 4 个 Markdown 文件</text>

  <!-- ===== EXPERIMENT AGENT (right track) ===== -->
  <rect x="490" y="130" width="230" height="220" rx="6" fill="white" stroke="#EA580C" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="490" y="130" width="230" height="26" rx="6" fill="#FFF7ED"/>
  <text x="605" y="148" text-anchor="middle" font-size="11" font-weight="bold" fill="#C2410C">Experiment Agent</text>
  <text x="605" y="168" text-anchor="middle" font-size="9" fill="#475569">asm-exp-{seq}-{short_name}</text>
  <line x1="505" y1="178" x2="705" y2="178" stroke="#E2E8F0" stroke-width="0.5"/>

  <text x="505" y="196" font-size="10" font-weight="bold" fill="#C2410C">读取</text>
  <text x="505" y="212" font-size="9" fill="#475569">{workDir}/.meta/briefings/</text>
  <text x="505" y="226" font-size="9" fill="#475569">{seq}-{short_name}.md</text>
  <text x="505" y="240" font-size="9" fill="#475569">ref-sources.md（如无 code）</text>

  <line x1="505" y1="250" x2="705" y2="250" stroke="#E2E8F0" stroke-width="0.5"/>

  <text x="505" y="268" font-size="10" font-weight="bold" fill="#C2410C">产出</text>
  <text x="505" y="286" font-size="9" fill="#475569">① 选取战略能力实验代码</text>
  <text x="505" y="302" font-size="9" fill="#475569">② 合并为可运行 HTML/JS</text>
  <text x="505" y="318" font-size="9" fill="#475569">③ 编写 experiment/README.md</text>
  <text x="505" y="334" font-size="9" fill="#475569">④ 保存 experiment/src/index.html</text>
  <text x="605" y="342" text-anchor="middle" font-size="8.5" fill="#C2410C" font-weight="bold">→ experiment/ 目录</text>

  <!-- ===== RIGHT: OUTPUT DIRECTORY ===== -->
  <!-- Arrow from both agents to output -->
  <line x1="470" y1="210" x2="560" y2="380" stroke="#8B5CF6" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="720" y1="210" x2="640" y2="380" stroke="#EA580C" stroke-width="1" stroke-dasharray="3,3"/>

  <rect x="530" y="380" width="220" height="140" rx="6" fill="white" stroke="#14B8A6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="530" y="380" width="220" height="26" rx="6" fill="#14B8A6"/>
  <text x="640" y="398" text-anchor="middle" font-size="12" font-weight="bold" fill="white">📂 每命题输出目录</text>
  <text x="640" y="420" text-anchor="middle" font-size="9" fill="#475569">{workDir}/{seq}-{short_name}/</text>
  <line x1="545" y1="430" x2="735" y2="430" stroke="#E2E8F0" stroke-width="0.5"/>
  <text x="545" y="446" font-size="9" fill="#0F766E">├── overview.md</text>
  <text x="545" y="460" font-size="9" fill="#0F766E">├── edge-cases.md</text>
  <text x="545" y="474" font-size="9" fill="#0F766E">├── trade-offs.md</text>
  <text x="545" y="488" font-size="9" fill="#0F766E">├── references.md</text>
  <text x="545" y="502" font-size="9" fill="#0F766E">└── experiment/</text>
  <text x="560" y="514" font-size="8" fill="#94A3B8">    ├── README.md</text>
  <text x="560" y="518" font-size="8" fill="#94A3B8">    └── src/index.html</text>

  <!-- ===== BOTTOM: KEY PRINCIPLE ===== -->
  <rect x="60" y="600" width="700" height="70" rx="6" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1"/>
  <text x="410" y="622" text-anchor="middle" font-size="11" font-weight="bold" fill="#1E40AF">核心原则</text>
  <text x="410" y="640" text-anchor="middle" font-size="10" fill="#475569">2-agent-per-命题：Markdown（4 文件）+ Experiment（2 文件）并行无依赖</text>
  <text x="410" y="656" text-anchor="middle" font-size="10" fill="#475569">每个 sub-agent 自主读取 briefings → 自主完成分析 → 自主写入产出</text>
  <text x="410" y="668" text-anchor="middle" font-size="9" fill="#64748B">主 agent 不读产出内容，只通过文件存在性判断完成状态</text>
</svg>
