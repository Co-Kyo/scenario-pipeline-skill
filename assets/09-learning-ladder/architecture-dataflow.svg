<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 700" font-family="Microsoft YaHei, PingFang SC, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4B5563"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16A34A"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3B82F6"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8B5CF6"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="820" height="700" fill="#F8FAFC" rx="8"/>

  <text x="410" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1E293B">Step 09 · 学习阶梯数据流</text>
  <text x="410" y="54" text-anchor="middle" font-size="11" fill="#64748B">每个 Ladder Agent 读什么 → 处理什么 → 产出什么</text>
  <line x1="80" y1="65" x2="740" y2="65" stroke="#CBD5E1" stroke-width="1"/>

  <!-- ===== LEFT: INPUT FILES ===== -->
  <rect x="30" y="85" width="140" height="190" rx="6" fill="white" stroke="#E2E8F0" stroke-width="1" filter="url(#shadow)"/>
  <text x="40" y="103" font-size="10" font-weight="bold" fill="#334155">📂 输入文件</text>
  <text x="40" y="122" font-size="9" fill="#64748B">capability-graph.json</text>
  <text x="40" y="138" font-size="9" fill="#64748B">summaries/*.json</text>
  <text x="40" y="154" font-size="9" fill="#64748B">briefings/*.md</text>
  <text x="40" y="170" font-size="9" fill="#64748B">overview.md</text>
  <text x="40" y="186" font-size="9" fill="#64748B">schemas.md</text>
  <text x="40" y="202" font-size="9" fill="#64748B">protocol-scheduling.md</text>
  <text x="40" y="222" font-size="9" fill="#64748B">ref-paths.md</text>
  <text x="40" y="260" font-size="8" fill="#94A3B8">全部由 Ladder Agent 自主读取</text>

  <!-- Dash arrows -->
  <line x1="170" y1="122" x2="240" y2="140" stroke="#4B5563" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="170" y1="154" x2="240" y2="270" stroke="#4B5563" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="170" y1="170" x2="240" y2="400" stroke="#4B5563" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="170" y1="186" x2="240" y2="530" stroke="#4B5563" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- ===== LADDER AGENTS COLUMNS ===== -->
  <!-- Agent 1 -->
  <rect x="240" y="85" width="180" height="140" rx="6" fill="white" stroke="#3B82F6" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="240" y="85" width="180" height="24" rx="6" fill="#DBEAFE"/>
  <text x="330" y="102" text-anchor="middle" font-size="11" font-weight="bold" fill="#1E40AF">Ladder Agent 1</text>
  <text x="330" y="122" text-anchor="middle" font-size="9" fill="#475569">依赖图拓扑排序</text>
  <text x="330" y="136" text-anchor="middle" font-size="9" fill="#475569">归纳 3-4 个里程碑阶段</text>
  <text x="330" y="150" text-anchor="middle" font-size="9" fill="#475569">编排概念 → 技能 → 综合</text>
  <text x="330" y="164" text-anchor="middle" font-size="9" fill="#475569">标注前置依赖关系</text>
  <text x="330" y="178" text-anchor="middle" font-size="9" fill="#475569">估算学习时长</text>
  <text x="330" y="196" text-anchor="middle" font-size="8.5" fill="#3B82F6" font-weight="bold">→ learning-ladder.md</text>

  <!-- Agent 2 -->
  <rect x="240" y="240" width="180" height="140" rx="6" fill="white" stroke="#3B82F6" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="240" y="240" width="180" height="24" rx="6" fill="#DBEAFE"/>
  <text x="330" y="257" text-anchor="middle" font-size="11" font-weight="bold" fill="#1E40AF">Ladder Agent 2</text>
  <text x="330" y="277" text-anchor="middle" font-size="9" fill="#475569">依赖图拓扑排序</text>
  <text x="330" y="291" text-anchor="middle" font-size="9" fill="#475569">归纳 3-4 个里程碑阶段</text>
  <text x="330" y="305" text-anchor="middle" font-size="9" fill="#475569">编排概念 → 技能 → 综合</text>
  <text x="330" y="319" text-anchor="middle" font-size="9" fill="#475569">标注前置依赖关系</text>
  <text x="330" y="333" text-anchor="middle" font-size="9" fill="#475569">估算学习时长</text>
  <text x="330" y="351" text-anchor="middle" font-size="8.5" fill="#3B82F6" font-weight="bold">→ learning-ladder.md</text>

  <!-- Agent 3 -->
  <rect x="240" y="395" width="180" height="140" rx="6" fill="white" stroke="#3B82F6" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="240" y="395" width="180" height="24" rx="6" fill="#DBEAFE"/>
  <text x="330" y="412" text-anchor="middle" font-size="11" font-weight="bold" fill="#1E40AF">Ladder Agent 3</text>
  <text x="330" y="432" text-anchor="middle" font-size="9" fill="#475569">依赖图拓扑排序</text>
  <text x="330" y="446" text-anchor="middle" font-size="9" fill="#475569">归纳 3-4 个里程碑阶段</text>
  <text x="330" y="460" text-anchor="middle" font-size="9" fill="#475569">编排概念 → 技能 → 综合</text>
  <text x="330" y="474" text-anchor="middle" font-size="9" fill="#475569">标注前置依赖关系</text>
  <text x="330" y="488" text-anchor="middle" font-size="9" fill="#475569">估算学习时长</text>
  <text x="330" y="506" text-anchor="middle" font-size="8.5" fill="#3B82F6" font-weight="bold">→ learning-ladder.md</text>

  <!-- Agent N -->
  <rect x="240" y="550" width="180" height="55" rx="6" fill="white" stroke="#93C5FD" stroke-width="1" filter="url(#shadow)"/>
  <text x="330" y="572" text-anchor="middle" font-size="10" font-weight="bold" fill="#1E40AF">… 更多 Agent</text>
  <text x="330" y="591" text-anchor="middle" font-size="9" fill="#64748B">简单窗口 W=5 并发</text>

  <!-- Arrows to output -->
  <line x1="420" y1="178" x2="530" y2="340" stroke="#3B82F6" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="420" y1="333" x2="530" y2="350" stroke="#3B82F6" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="420" y1="488" x2="530" y2="360" stroke="#3B82F6" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- ===== RIGHT: OUTPUT ===== -->
  <rect x="530" y="290" width="260" height="140" rx="6" fill="white" stroke="#14B8A6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="530" y="290" width="260" height="26" rx="6" fill="#0F766E"/>
  <text x="660" y="308" text-anchor="middle" font-size="12" font-weight="bold" fill="white">输出文件</text>
  <text x="660" y="335" text-anchor="middle" font-size="10" font-weight="bold" fill="#0F766E">learning-ladder.md</text>
  <text x="660" y="355" text-anchor="middle" font-size="9" fill="#475569">01-xxx/learning-ladder.md</text>
  <text x="660" y="373" text-anchor="middle" font-size="9" fill="#475569">02-yyy/learning-ladder.md</text>
  <text x="660" y="391" text-anchor="middle" font-size="9" fill="#475569">03-zzz/learning-ladder.md</text>
  <text x="660" y="409" text-anchor="middle" font-size="9" fill="#475569">…（每命题一份）</text>
  <text x="660" y="420" text-anchor="middle" font-size="8.5" fill="#94A3B8">{seq}-{short_name}/learning-ladder.md</text>

  <!-- Arrow to output -->
  <line x1="420" y1="580" x2="660" y2="430" stroke="#4B5563" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arrow)"/>

  <!-- ===== BOTTOM: KEY PRINCIPLE ===== -->
  <rect x="60" y="625" width="700" height="55" rx="6" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1"/>
  <text x="410" y="645" text-anchor="middle" font-size="11" font-weight="bold" fill="#1E40AF">核心原则</text>
  <text x="410" y="663" text-anchor="middle" font-size="10" fill="#475569">每个 Ladder Agent 自主拓扑排序 → 归纳阶段 → 编排步骤，从"不会"构建到"能讲"的渐进路径</text>
  <text x="410" y="677" text-anchor="middle" font-size="9" fill="#64748B">主 agent 不干预学习路径编排，只负责调度和窗口管理</text>
</svg>