<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 750" font-family="Microsoft YaHei, PingFang SC, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4B5563"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16A34A"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3B82F6"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8B5CF6"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="600" height="750" fill="#F8FAFC" rx="8"/>

  <!-- Title -->
  <text x="300" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1E293B">Step 09 · 主 Agent 编排流程</text>
  <text x="300" y="54" text-anchor="middle" font-size="11" fill="#64748B">学习阶梯生成 — 从"不会"到"能讲"的渐进路径</text>
  <line x1="80" y1="65" x2="520" y2="65" stroke="#CBD5E1" stroke-width="1"/>

  <!-- Step 1 -->
  <rect x="180" y="85" width="240" height="40" rx="6" fill="white" stroke="#F97316" stroke-width="2" filter="url(#shadow)"/>
  <text x="300" y="110" text-anchor="middle" font-size="12" font-weight="bold" fill="#C2410C">① 筛选待生成命题</text>
  <line x1="300" y1="125" x2="300" y2="150" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 2: Check -->
  <rect x="180" y="150" width="240" height="40" rx="6" fill="white" stroke="#F97316" stroke-width="2" filter="url(#shadow)"/>
  <text x="300" y="175" text-anchor="middle" font-size="12" font-weight="bold" fill="#C2410C">② 增量检查（已有则跳过）</text>
  <line x1="300" y1="190" x2="300" y2="215" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Spawn ladder agents -->
  <rect x="100" y="215" width="400" height="95" rx="6" fill="white" stroke="#3B82F6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="100" y="215" width="400" height="24" rx="6" fill="#DBEAFE"/>
  <text x="300" y="232" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E40AF">③ 并行 spawn（简单窗口 W=5）</text>
  <text x="300" y="255" text-anchor="middle" font-size="10" fill="#475569">label: ladder-{seq}-{short_name}</text>
  <text x="300" y="271" text-anchor="middle" font-size="10" fill="#475569">超时 5min · 轮询替换槽位</text>
  <text x="300" y="291" text-anchor="middle" font-size="9" fill="#94A3B8">每完成一个 → 释放槽位 → 填补下一个</text>
  <line x1="300" y1="310" x2="300" y2="340" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Wait -->
  <rect x="180" y="340" width="240" height="35" rx="6" fill="#F1F5F9" stroke="#94A3B8" stroke-width="1" filter="url(#shadow)"/>
  <text x="300" y="362" text-anchor="middle" font-size="11" fill="#475569">④ 轮询等待（超时 5min）</text>
  <line x1="300" y1="375" x2="300" y2="405" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Barrier -->
  <rect x="130" y="405" width="340" height="50" rx="6" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="300" y="426" text-anchor="middle" font-size="12" font-weight="bold" fill="#92400E">🛑 ⑤ Barrier 9（强制停顿）</text>
  <text x="300" y="444" text-anchor="middle" font-size="10" fill="#B45309">所有命题已完成 → 继续 · 否则停住等决策</text>
  <line x1="300" y1="455" x2="300" y2="485" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Output -->
  <rect x="155" y="485" width="290" height="45" rx="6" fill="white" stroke="#14B8A6" stroke-width="2" filter="url(#shadow)"/>
  <text x="300" y="505" text-anchor="middle" font-size="12" font-weight="bold" fill="#0F766E">⑥ 写入 learning-ladder.md</text>
  <text x="300" y="522" text-anchor="middle" font-size="9.5" fill="#64748B">每个命题一份学习阶梯文件</text>
  <line x1="300" y1="530" x2="300" y2="560" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- End -->
  <rect x="180" y="560" width="240" height="35" rx="17" fill="#14B8A6" filter="url(#shadow)"/>
  <text x="300" y="582" text-anchor="middle" font-size="11.5" font-weight="bold" fill="white">⑦ 全流程结束</text>

  <!-- Right side: files read -->
  <rect x="430" y="85" width="155" height="145" rx="6" fill="white" stroke="#E2E8F0" stroke-width="1" filter="url(#shadow)"/>
  <text x="440" y="103" font-size="10" font-weight="bold" fill="#334155">主 agent 读取</text>
  <text x="440" y="120" font-size="8.5" fill="#64748B">schemas.md</text>
  <text x="440" y="134" font-size="8.5" fill="#64748B">protocol-scheduling.md</text>
  <text x="440" y="148" font-size="8.5" fill="#64748B">capability-graph.json</text>
  <text x="440" y="162" font-size="8.5" fill="#64748B">summaries/*.json</text>
  <text x="440" y="176" font-size="8.5" fill="#64748B">briefings/*.md</text>
  <text x="440" y="190" font-size="8.5" fill="#64748B">overview.md</text>
  <text x="440" y="210" font-size="7.5" fill="#94A3B8">不读 sub-agent 产物</text>

  <!-- Bottom: note -->
  <rect x="60" y="660" width="480" height="65" rx="6" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1"/>
  <text x="300" y="680" text-anchor="middle" font-size="10" font-weight="bold" fill="#166534">主 agent 只做编排：筛选 → 增量检查 → spawn 队列 → barrier → 产出</text>
  <text x="300" y="696" text-anchor="middle" font-size="9" fill="#15803D">简单窗口 W=5：最多 5 个 ladder agent 并发</text>
  <text x="300" y="712" text-anchor="middle" font-size="9" fill="#15803D">Ladder Agent 自主完成拓扑排序 → 阶段归纳 → 步骤编排</text>
</svg>