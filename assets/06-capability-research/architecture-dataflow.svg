  <rect x="269" y="180" width="138" height="55" rx="5" fill="white" stroke="#3B82F6" stroke-width="1" filter="url(#shadow)"/>
  <rect x="269" y="180" width="138" height="20" rx="5" fill="#DBEAFE"/>
  <text x="338" y="194" text-anchor="middle" font-size="9" font-weight="bold" fill="#1E40AF">D₁ 性能优化①</text>
  <text x="338" y="215" text-anchor="middle" font-size="7.5" fill="#475569">读: capability-graph.json</text>
  <text x="338" y="228" text-anchor="middle" font-size="7.5" fill="#475569">写: D1-能力.md + 摘要.json</text>

  <!-- Agent E_1 -->
  <rect x="417" y="180" width="138" height="55" rx="5" fill="white" stroke="#3B82F6" stroke-width="1" filter="url(#shadow)"/>
  <rect x="417" y="180" width="138" height="20" rx="5" fill="#DBEAFE"/>
  <text x="486" y="194" text-anchor="middle" font-size="9" font-weight="bold" fill="#1E40AF">E₁ 构建工具①</text>
  <text x="486" y="215" text-anchor="middle" font-size="7.5" fill="#475569">读: capability-graph.json</text>
  <text x="486" y="228" text-anchor="middle" font-size="7.5" fill="#475569">写: E1-能力.md + 摘要.json</text>

