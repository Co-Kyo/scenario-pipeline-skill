  <text x="412" y="150" text-anchor="middle" font-size="7.5" fill="#475569">读: capability-graph.json</text>
  <text x="412" y="163" text-anchor="middle" font-size="7.5" fill="#475569">写: B1-能力.md + 摘要.json</text>

  <!-- Agent C_1 -->
  <rect x="491" y="115" width="138" height="55" rx="5" fill="white" stroke="#3B82F6" stroke-width="1" filter="url(#shadow)"/>
  <rect x="491" y="115" width="138" height="20" rx="5" fill="#DBEAFE"/>
  <text x="560" y="129" text-anchor="middle" font-size="9" font-weight="bold" fill="#1E40AF">C₁ 状态管理</text>
  <text x="560" y="150" text-anchor="middle" font-size="7.5" fill="#475569">读: capability-graph.json</text>
  <text x="560" y="163" text-anchor="middle" font-size="7.5" fill="#475569">写: C1-能力.md + 摘要.json</text>

