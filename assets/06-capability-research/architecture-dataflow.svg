  </defs>

  <rect width="820" height="700" fill="#F8FAFC" rx="8"/>

  <text x="410" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1E293B">Step 06 · Sub-Agent 数据流</text>
  <text x="410" y="54" text-anchor="middle" font-size="11" fill="#64748B">域 agent 读什么 → 做什么 → 产出什么（DAG 调度模式）</text>
  <line x1="80" y1="65" x2="740" y2="65" stroke="#CBD5E1" stroke-width="1"/>

  <!-- ===== LEFT: INPUT FILES ===== -->
  <rect x="25" y="85" width="145" height="200" rx="6" fill="white" stroke="#E2E8F0" stroke-width="1" filter="url(#shadow)"/>
  <text x="35" y="103" font-size="10" font-weight="bold" fill="#334155">📂 输入文件</text>
  <text x="35" y="122" font-size="8.5" fill="#64748B">capability-graph.json</text>
  <text x="35" y="138" font-size="8.5" fill="#64748B">schemas.md§06</text>
  <text x="35" y="154" font-size="8.5" fill="#64748B">ref-sources.md</text>
  <text x="35" y="170" font-size="8.5" fill="#64748B">protocol-scheduling.md</text>
  <text x="35" y="186" font-size="8.5" fill="#64748B">capability-research-mode.md</text>
  <text x="35" y="202" font-size="8.5" fill="#64748B">README.md</text>
  <text x="35" y="222" font-size="8" fill="#94A3B8">全部由域 agent 自主读取</text>

  <!-- Arrows from input to DAG area -->
  <line x1="170" y1="130" x2="195" y2="135" stroke="#4B5563" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="170" y1="160" x2="195" y2="195" stroke="#4B5563" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- ===== DAG LEVEL 0 HEADER ===== -->
  <rect x="195" y="85" width="430" height="22" rx="4" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1"/>
  <text x="410" y="101" text-anchor="middle" font-size="10" font-weight="bold" fill="#6D28D9">DAG Level 0 · 并行（无跨组依赖）</text>

  <!-- Agent A_1 -->
  <rect x="195" y="115" width="138" height="55" rx="5" fill="white" stroke="#3B82F6" stroke-width="1" filter="url(#shadow)"/>
  <rect x="195" y="115" width="138" height="20" rx="5" fill="#DBEAFE"/>
  <text x="264" y="129" text-anchor="middle" font-size="9" font-weight="bold" fill="#1E40AF">A₁ 渲染与引擎①</text>
  <text x="264" y="150" text-anchor="middle" font-size="7.5" fill="#475569">读: capability-graph.json</text>
  <text x="264" y="163" text-anchor="middle" font-size="7.5" fill="#475569">写: A1-能力.md + 摘要.json</text>

