<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 680" font-family="Microsoft YaHei, PingFang SC, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4B5563"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16A34A"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3B82F6"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8B5CF6"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="820" height="600" fill="#F8FAFC" rx="8"/>

  <text x="410" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1E293B">Step 06 · 文件依赖图</text>
  <text x="410" y="54" text-anchor="middle" font-size="11" fill="#64748B">谁读哪个文件 — 主 agent 与域 agent 的读取边界</text>
  <line x1="80" y1="65" x2="740" y2="65" stroke="#CBD5E1" stroke-width="1"/>

  <!-- ===== TOP: MAIN AGENT READS ===== -->
  <rect x="260" y="85" width="300" height="130" rx="6" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="410" y="105" text-anchor="middle" font-size="11" font-weight="bold" fill="#166534">主 Agent 读取的文件</text>

  <rect x="275" y="115" width="270" height="22" rx="4" fill="white" stroke="#86EFAC" stroke-width="1"/>
  <text x="410" y="130" text-anchor="middle" font-size="9" fill="#166534">capability-research-mode.md（插件）</text>

  <rect x="275" y="142" width="115" height="22" rx="4" fill="white" stroke="#86EFAC" stroke-width="1"/>
  <text x="332" y="157" text-anchor="middle" font-size="9" fill="#166534">schemas.md§06</text>

  <rect x="395" y="142" width="150" height="22" rx="4" fill="white" stroke="#86EFAC" stroke-width="1"/>
  <text x="470" y="157" text-anchor="middle" font-size="9" fill="#166534">ref-sources.md</text>

  <rect x="275" y="169" width="145" height="22" rx="4" fill="white" stroke="#86EFAC" stroke-width="1"/>
  <text x="347" y="184" text-anchor="middle" font-size="9" fill="#166534">protocol-scheduling.md</text>

  <rect x="425" y="169" width="120" height="22" rx="4" fill="white" stroke="#86EFAC" stroke-width="1"/>
  <text x="485" y="184" text-anchor="middle" font-size="9" fill="#166534">README.md</text>

  <!-- Divider -->
  <line x1="80" y1="230" x2="740" y2="230" stroke="#CBD5E1" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="410" y="245" text-anchor="middle" font-size="9" fill="#94A3B8">— 读取边界 — 主 agent 不跨越此线 —</text>

  <!-- ===== BOTTOM: SUB-AGENT READS ===== -->
  <rect x="160" y="265" width="500" height="140" rx="6" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="410" y="285" text-anchor="middle" font-size="11" font-weight="bold" fill="#1E40AF">域 Agent 读取的文件</text>

  <!-- capability-graph.json (shared) -->
  <rect x="260" y="297" width="300" height="30" rx="4" fill="white" stroke="#93C5FD" stroke-width="1.5"/>
  <text x="410" y="317" text-anchor="middle" font-size="10" font-weight="bold" fill="#1E40AF">capability-graph.json（所有域 Agent 共享）</text>

  <!-- Summary files (dependency coordination) -->
  <rect x="175" y="337" width="470" height="30" rx="4" fill="white" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="410" y="357" text-anchor="middle" font-size="9.5" fill="#6D28D9">summaries/*.json（依赖协调：Level 1 读 Level 0 的摘要）</text>

  <!-- Other sub-agent files -->
  <rect x="200" y="375" width="240" height="22" rx="4" fill="white" stroke="#93C5FD" stroke-width="1"/>
  <text x="320" y="390" text-anchor="middle" font-size="8.5" fill="#1E40AF">schemas.md§06（输出格式）</text>

  <rect x="450" y="375" width="195" height="22" rx="4" fill="white" stroke="#93C5FD" stroke-width="1"/>
  <text x="547" y="390" text-anchor="middle" font-size="8.5" fill="#1E40AF">ref-sources.md + protocol-scheduling.md</text>

  <!-- ===== BOTTOM: AGENT BOXES ===== -->
  <!-- Row 1: A_1, B_1, C_1 -->
  <rect x="192" y="430" width="140" height="48" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="262" y="452" text-anchor="middle" font-size="9.5" font-weight="bold" fill="#1E40AF">A₁ 渲染与引擎①</text>
  <text x="262" y="470" text-anchor="middle" font-size="7.5" fill="#475569">读: graph | 写: A1-能力.md</text>

  <rect x="340" y="430" width="140" height="48" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="410" y="452" text-anchor="middle" font-size="9.5" font-weight="bold" fill="#1E40AF">B₁ 通信与数据</text>
  <text x="410" y="470" text-anchor="middle" font-size="7.5" fill="#475569">读: graph | 写: B1-能力.md</text>

  <rect x="488" y="430" width="140" height="48" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="558" y="452" text-anchor="middle" font-size="9.5" font-weight="bold" fill="#1E40AF">C₁ 状态管理</text>
  <text x="558" y="470" text-anchor="middle" font-size="7.5" fill="#475569">读: graph | 写: C1-能力.md</text>

  <!-- Row 2: D_1, E_1 -->
  <rect x="266" y="488" width="140" height="48" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="336" y="510" text-anchor="middle" font-size="9.5" font-weight="bold" fill="#1E40AF">D₁ 性能优化①</text>
  <text x="336" y="528" text-anchor="middle" font-size="7.5" fill="#475569">读: graph | 写: D1-能力.md</text>

  <rect x="414" y="488" width="140" height="48" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="484" y="510" text-anchor="middle" font-size="9.5" font-weight="bold" fill="#1E40AF">E₁ 构建工具①</text>
  <text x="484" y="528" text-anchor="middle" font-size="7.5" fill="#475569">读: graph | 写: E1-能力.md</text>

  <!-- Row 3: A_2, D_2, E_2 -->
  <rect x="192" y="546" width="140" height="40" rx="6" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="262" y="565" text-anchor="middle" font-size="9" font-weight="bold" fill="#6D28D9">A₂ 渲染与引擎②</text>
  <text x="262" y="580" text-anchor="middle" font-size="7" fill="#475569">读: A₁摘要</text>

  <rect x="340" y="546" width="140" height="40" rx="6" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="410" y="565" text-anchor="middle" font-size="9" font-weight="bold" fill="#6D28D9">D₂ 性能优化②</text>
  <text x="410" y="580" text-anchor="middle" font-size="7" fill="#475569">读: D₁摘要</text>

  <rect x="488" y="546" width="140" height="40" rx="6" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="558" y="565" text-anchor="middle" font-size="9" font-weight="bold" fill="#6D28D9">E₂ 构建工具②</text>
  <text x="558" y="580" text-anchor="middle" font-size="7" fill="#475569">读: E₁摘要</text>

  <!-- ===== BOTTOM: BOUNDARY RULES ===== -->
  <rect x="160" y="616" width="500" height="55" rx="6" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1.5"/>
  <text x="410" y="636" text-anchor="middle" font-size="10" font-weight="bold" fill="#166534">边界规则</text>
  <text x="410" y="654" text-anchor="middle" font-size="8.5" fill="#15803D">主 agent 不读 capability-graph.json · 域 agent 不读主 agent 专属文件（schemas.md§06 等）</text>
  <text x="410" y="670" text-anchor="middle" font-size="8" fill="#15803D">依赖摘要仅由下游 Level 1 agent 读取 · 跨Agent协调通过文件系统而非对话</text>

</svg>
