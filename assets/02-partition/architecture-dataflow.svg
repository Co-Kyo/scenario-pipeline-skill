<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 700" font-family="Microsoft YaHei, PingFang SC, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4B5563"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="820" height="700" fill="#F8FAFC" rx="8"/>

  <text x="410" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1E293B">Step 02 · 依赖整理与命题分区数据流</text>
  <text x="410" y="54" text-anchor="middle" font-size="11" fill="#64748B">单 Agent 读什么 → 做什么 → 产出什么</text>
  <line x1="80" y1="65" x2="740" y2="65" stroke="#CBD5E1" stroke-width="1"/>

  <!-- ===== LEFT: INPUT FILES ===== -->
  <rect x="30" y="85" width="140" height="130" rx="6" fill="white" stroke="#E2E8F0" stroke-width="1" filter="url(#shadow)"/>
  <text x="40" y="103" font-size="10" font-weight="bold" fill="#334155">📂 输入文件</text>
  <text x="40" y="122" font-size="9" fill="#64748B">requirement-web.json</text>
  <text x="40" y="140" font-size="9" fill="#64748B">schemas.md</text>
  <text x="40" y="164" font-size="8" fill="#94A3B8">跨步骤读取</text>

  <line x1="170" y1="130" x2="240" y2="130" stroke="#4B5563" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="205" y="125" text-anchor="middle" font-size="8" fill="#94A3B8">读取</text>

  <!-- ===== CENTER: PIPELINE ===== -->
  <!-- Box 1 -->
  <rect x="240" y="85" width="300" height="50" rx="6" fill="white" stroke="#F97316" stroke-width="2" filter="url(#shadow)"/>
  <text x="390" y="108" text-anchor="middle" font-size="12" font-weight="bold" fill="#C2410C">阶段① 依赖关系确认</text>
  <text x="390" y="126" text-anchor="middle" font-size="9.5" fill="#475569">从 requirement-web.json 推断依赖</text>
  <line x1="390" y1="135" x2="390" y2="160" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Box 2 -->
  <rect x="240" y="160" width="300" height="55" rx="6" fill="white" stroke="#F97316" stroke-width="2" filter="url(#shadow)"/>
  <text x="390" y="183" text-anchor="middle" font-size="12" font-weight="bold" fill="#C2410C">阶段② DAG 构建</text>
  <text x="390" y="201" text-anchor="middle" font-size="9.5" fill="#475569">检测循环依赖 → 断环 → 拓扑排序</text>
  <text x="390" y="213" text-anchor="middle" font-size="8" fill="#94A3B8">生成有向无环图</text>
  <line x1="390" y1="215" x2="390" y2="240" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Box 3 -->
  <rect x="240" y="240" width="300" height="65" rx="6" fill="white" stroke="#F97316" stroke-width="2" filter="url(#shadow)"/>
  <text x="390" y="263" text-anchor="middle" font-size="12" font-weight="bold" fill="#C2410C">阶段③ 三层分区</text>
  <text x="390" y="282" text-anchor="middle" font-size="9.5" fill="#475569">连通分量 → 拓扑深度 → 社区发现</text>
  <text x="390" y="297" text-anchor="middle" font-size="8.5" fill="#94A3B8">社区发现仅在规模超过阈值时触发</text>
  <line x1="390" y1="305" x2="390" y2="330" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Box 4 -->
  <rect x="240" y="330" width="300" height="50" rx="6" fill="white" stroke="#F97316" stroke-width="2" filter="url(#shadow)"/>
  <text x="390" y="353" text-anchor="middle" font-size="12" font-weight="bold" fill="#C2410C">阶段④ Session 分配</text>
  <text x="390" y="371" text-anchor="middle" font-size="9.5" fill="#475569">Core-First 策略 · 高扇出节点优先</text>
  <line x1="390" y1="380" x2="390" y2="410" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Box 5 -->
  <rect x="240" y="410" width="300" height="55" rx="6" fill="white" stroke="#14B8A6" stroke-width="2" filter="url(#shadow)"/>
  <text x="390" y="433" text-anchor="middle" font-size="12" font-weight="bold" fill="#0F766E">阶段⑤ 写入输出</text>
  <text x="390" y="451" text-anchor="middle" font-size="9.5" fill="#64748B">partition-analysis.json</text>
  <text x="390" y="463" text-anchor="middle" font-size="9.5" fill="#64748B">execution-plan.md</text>

  <!-- ===== RIGHT: OUTPUT ===== -->
  <line x1="540" y1="437" x2="600" y2="437" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="600" y="410" width="190" height="55" rx="6" fill="white" stroke="#14B8A6" stroke-width="2" filter="url(#shadow)"/>
  <text x="695" y="433" text-anchor="middle" font-size="11" font-weight="bold" fill="#0F766E">📄 输出文件</text>
  <text x="695" y="451" text-anchor="middle" font-size="8.5" fill="#64748B">partition-analysis.json</text>
  <text x="695" y="463" text-anchor="middle" font-size="8.5" fill="#64748B">execution-plan.md</text>

  <!-- ===== BOTTOM: PRINCIPLE ===== -->
  <rect x="60" y="610" width="700" height="60" rx="6" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1"/>
  <text x="410" y="634" text-anchor="middle" font-size="11" font-weight="bold" fill="#166534">核心原则</text>
  <text x="410" y="652" text-anchor="middle" font-size="10" fill="#475569">Agent 按顺序串行执行 5 个阶段，从 requirement-web.json 推断依赖关系并进行分区</text>
  <text x="410" y="666" text-anchor="middle" font-size="9" fill="#64748B">无 Sub-Agent · 无并行 · 社区发现条件触发</text>
</svg>
