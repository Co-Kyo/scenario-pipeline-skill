<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 600" font-family="Microsoft YaHei, PingFang SC, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4B5563"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="820" height="600" fill="#F8FAFC" rx="8"/>

  <text x="410" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1E293B">Step 02 · 文件依赖图</text>
  <text x="410" y="54" text-anchor="middle" font-size="11" fill="#64748B">Agent 读取哪些文件 — 读取边界</text>
  <line x1="80" y1="65" x2="740" y2="65" stroke="#CBD5E1" stroke-width="1"/>

  <!-- ===== CENTER: FILES ===== -->
  <rect x="250" y="85" width="320" height="120" rx="6" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="410" y="105" text-anchor="middle" font-size="11" font-weight="bold" fill="#166534">Agent 读取的文件</text>

  <rect x="290" y="125" width="240" height="30" rx="4" fill="white" stroke="#86EFAC" stroke-width="1"/>
  <text x="410" y="145" text-anchor="middle" font-size="9.5" fill="#166534">schemas.md（含 partition 输出格式）</text>

  <rect x="290" y="165" width="240" height="30" rx="4" fill="white" stroke="#86EFAC" stroke-width="1"/>
  <text x="410" y="185" text-anchor="middle" font-size="9.5" fill="#166534">requirement-web.json（跨步骤）</text>

  <!-- Divider -->
  <line x1="100" y1="230" x2="720" y2="230" stroke="#CBD5E1" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="410" y="245" text-anchor="middle" font-size="9" fill="#94A3B8">— 读取边界 — Agent 不跨越此线 —</text>

  <!-- Agent box -->
  <rect x="280" y="270" width="260" height="70" rx="6" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="410" y="298" text-anchor="middle" font-size="11" font-weight="bold" fill="#1E40AF">依赖整理与分区 Agent</text>
  <text x="410" y="318" text-anchor="middle" font-size="9" fill="#475569">串行执行 5 阶段 · 无 Sub-Agent</text>
  <text x="410" y="330" text-anchor="middle" font-size="8" fill="#64748B">输出: partition-analysis.json + execution-plan.md</text>

  <!-- Arrow -->
  <line x1="410" y1="205" x2="410" y2="270" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Legend -->
  <rect x="100" y="480" width="620" height="80" rx="6" fill="#FFF7ED" stroke="#FDBA74" stroke-width="1"/>
  <text x="110" y="502" font-size="10" font-weight="bold" fill="#9A3412">边界规则</text>
  <text x="110" y="522" font-size="9" fill="#9A3412">Agent 只读绿框中列出的 2 个文件</text>
  <text x="110" y="540" font-size="9" fill="#9A3412">requirement-web.json 由 Step 01 产出，跨步骤读取</text>
  <text x="110" y="556" font-size="9" fill="#9A3412">Barrier 2 在输出写入后触发，确认后注入 Step 03</text>
</svg>
