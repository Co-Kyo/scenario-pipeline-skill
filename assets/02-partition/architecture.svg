<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 900" font-family="Microsoft YaHei, PingFang SC, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4B5563"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#EA580C"/>
    </marker>
    <linearGradient id="grad-blue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#2563EB;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="grad-teal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#14B8A6;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0D9488;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <filter id="shadow-lg" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="2" dy="3" stdDeviation="5" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="700" height="900" fill="#F8FAFC" rx="8"/>

  <!-- Title -->
  <text x="350" y="42" text-anchor="middle" font-size="20" font-weight="bold" fill="#1E293B">Step 02 · 依赖整理与命题分区 — 架构流程图</text>
  <line x1="100" y1="55" x2="600" y2="55" stroke="#CBD5E1" stroke-width="1"/>

  <!-- ===== INPUT ===== -->
  <rect x="175" y="75" width="350" height="52" rx="26" fill="url(#grad-blue)" filter="url(#shadow)"/>
  <text x="350" y="99" text-anchor="middle" font-size="14" fill="white" font-weight="bold">📥 来自 Step 01 的 requirement-web.json</text>
  <text x="350" y="116" text-anchor="middle" font-size="11" fill="#DBEAFE">propositions[] + dependencies[] + capability_web</text>
  <line x1="350" y1="127" x2="350" y2="155" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== Step 1: 依赖关系确认 ===== -->
  <rect x="140" y="155" width="420" height="70" rx="6" fill="white" stroke="#8B5CF6" stroke-width="2" filter="url(#shadow)"/>
  <text x="350" y="180" text-anchor="middle" font-size="13" font-weight="bold" fill="#6D28D9">① 依赖关系确认</text>
  <text x="350" y="200" text-anchor="middle" font-size="10" fill="#64748B">dependencies[] 已存在 → 直接使用</text>
  <text x="350" y="216" text-anchor="middle" font-size="10" fill="#64748B">不存在 → 基于 capability_web 推断（prerequisite / enables / related / extends）</text>
  <line x1="350" y1="225" x2="350" y2="255" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== Step 2: 构建 DAG ===== -->
  <rect x="140" y="255" width="420" height="65" rx="6" fill="white" stroke="#8B5CF6" stroke-width="2" filter="url(#shadow)"/>
  <text x="350" y="280" text-anchor="middle" font-size="13" font-weight="bold" fill="#6D28D9">② 构建 DAG</text>
  <text x="350" y="300" text-anchor="middle" font-size="10" fill="#64748B">节点=命题 / 边=依赖 → 检测环 → 断开 related 类型直至无环</text>
  <line x1="350" y1="320" x2="350" y2="350" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== Step 3: 三层分区 ===== -->
  <rect x="80" y="350" width="540" height="200" rx="6" fill="white" stroke="#8B5CF6" stroke-width="2" filter="url(#shadow)"/>
  <text x="350" y="375" text-anchor="middle" font-size="13" font-weight="bold" fill="#6D28D9">③ 三层分区</text>

  <!-- 3.1 -->
  <rect x="105" y="390" width="160" height="45" rx="5" fill="#F3E8FF" stroke="#C4B5FD" stroke-width="1"/>
  <text x="185" y="410" text-anchor="middle" font-size="10" font-weight="bold" fill="#6D28D9">3.1 连通分量识别</text>
  <text x="185" y="426" text-anchor="middle" font-size="9" fill="#7C3AED">DAG → 候选 session</text>

  <!-- Arrow 3.1 → 3.2 -->
  <line x1="265" y1="412" x2="290" y2="412" stroke="#4B5563" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- 3.2 -->
  <rect x="290" y="390" width="160" height="45" rx="5" fill="#F3E8FF" stroke="#C4B5FD" stroke-width="1"/>
  <text x="370" y="410" text-anchor="middle" font-size="10" font-weight="bold" fill="#6D28D9">3.2 拓扑深度分层</text>
  <text x="370" y="426" text-anchor="middle" font-size="9" fill="#7C3AED">depth → 可并行层</text>

  <!-- Arrow 3.2 → diamond -->
  <line x1="370" y1="435" x2="370" y2="460" stroke="#4B5563" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Decision diamond -->
  <polygon points="370,460 410,480 370,500 330,480" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="370" y="484" text-anchor="middle" font-size="9" font-weight="bold" fill="#92400E">&gt;8 节点?</text>

  <!-- Yes branch → 社区发现 -->
  <line x1="410" y1="480" x2="440" y2="480" stroke="#EA580C" stroke-width="1"/>
  <rect x="440" y="465" width="80" height="30" rx="5" fill="#FFF7ED" stroke="#EA580C" stroke-width="1"/>
  <text x="480" y="485" text-anchor="middle" font-size="9" font-weight="bold" fill="#C2410C">社区发现</text>
  <text x="425" y="473" font-size="8" fill="#EA580C">Yes</text>
  <!-- Community → back to flow -->
  <path d="M 480 495 L 480 520 L 350 520 L 350 550" fill="none" stroke="#EA580C" stroke-width="1" marker-end="url(#arrow-orange)"/>

  <!-- No branch → skip -->
  <line x1="330" y1="480" x2="290" y2="480" stroke="#4B5563" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="310" y="473" font-size="8" fill="#64748B">No</text>
  <!-- No → join -->
  <path d="M 290 480 L 260 480 L 260 520 L 350 520" fill="none" stroke="#4B5563" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- 3.3 label -->
  <text x="480" y="510" text-anchor="middle" font-size="8" fill="#94A3B8">Leiden 算法聚类</text>

  <line x1="350" y1="550" x2="350" y2="580" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== Step 4: session 分配 ===== -->
  <rect x="140" y="580" width="420" height="65" rx="6" fill="white" stroke="#8B5CF6" stroke-width="2" filter="url(#shadow)"/>
  <text x="350" y="605" text-anchor="middle" font-size="13" font-weight="bold" fill="#6D28D9">④ session 分配</text>
  <text x="350" y="625" text-anchor="middle" font-size="10" fill="#64748B">core 角色命题最多的分量 → S1 当前 session</text>
  <text x="350" y="640" text-anchor="middle" font-size="10" fill="#64748B">其余 → S2, S3... 排期（按拓扑 depth 从低到高执行）</text>
  <line x1="350" y1="645" x2="350" y2="675" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== OUTPUT ===== -->
  <rect x="80" y="675" width="250" height="48" rx="6" fill="#F0FDFA" stroke="#14B8A6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="205" y="699" text-anchor="middle" font-size="10" font-weight="bold" fill="#0F766E">📄 partition-analysis.json</text>
  <text x="205" y="714" text-anchor="middle" font-size="9" fill="#64748B">DAG + 分量 + 分层 + 社区 + session</text>

  <rect x="370" y="675" width="250" height="48" rx="6" fill="#F0FDFA" stroke="#14B8A6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="495" y="699" text-anchor="middle" font-size="10" font-weight="bold" fill="#0F766E">📄 execution-plan.md</text>
  <text x="495" y="714" text-anchor="middle" font-size="9" fill="#64748B">本次执行 + 排期命题 + 恢复指令</text>

  <line x1="350" y1="723" x2="350" y2="755" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== Barrier 2 ===== -->
  <rect x="155" y="755" width="390" height="50" rx="6" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2" filter="url(#shadow)"/>
  <text x="350" y="777" text-anchor="middle" font-size="13" font-weight="bold" fill="#92400E">🛑 Barrier 2 检查点（强制停顿）</text>
  <text x="350" y="795" text-anchor="middle" font-size="10" fill="#B45309">展示分区摘要 → 用户确认 / 调整 / 重新分区</text>

  <!-- ===== RIGHT: Key Files ===== -->
  <rect x="520" y="75" width="165" height="100" rx="6" fill="white" stroke="#E2E8F0" stroke-width="1" filter="url(#shadow)"/>
  <text x="530" y="93" font-size="10" font-weight="bold" fill="#334155">📋 关键文件</text>
  <text x="530" y="110" font-size="9" fill="#64748B">schemas.md §分区结构</text>
  <text x="530" y="124" font-size="9" fill="#64748B">protocol-scheduling.md</text>
  <text x="530" y="138" font-size="9" fill="#64748B">strategy-level.md</text>
  <text x="530" y="152" font-size="9" fill="#64748B">rule-reuse.md（增量复用）</text>
  <text x="530" y="168" font-size="8" fill="#94A3B8">前置: 01 产出 requirement-web.json</text>

  <!-- ===== RIGHT: Key Features ===== -->
  <rect x="520" y="195" width="165" height="120" rx="6" fill="white" stroke="#E2E8F0" stroke-width="1" filter="url(#shadow)"/>
  <text x="530" y="213" font-size="10" font-weight="bold" fill="#334155">📌 关键特性</text>
  <text x="530" y="232" font-size="9" fill="#64748B">· DAG + 环检测打断</text>
  <text x="530" y="248" font-size="9" fill="#64748B">· 三层渐进分区</text>
  <text x="530" y="264" font-size="9" fill="#64748B">  连通分量 → 拓扑深度</text>
  <text x="530" y="280" font-size="9" fill="#64748B">  → 社区发现(条件)</text>
  <text x="530" y="296" font-size="9" fill="#64748B">· core 命题优先分配</text>
  <text x="530" y="312" font-size="9" fill="#64748B">· 增量复用已有分区</text>
</svg>