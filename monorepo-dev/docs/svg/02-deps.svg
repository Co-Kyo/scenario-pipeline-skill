<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 800" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <filter id="shadow-light" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.2"/>
    </filter>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0L0 0 0 32" fill="none" stroke="#2a2b4e" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow-solid" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,1 L9,5 L0,9 Z" fill="#94a3b8"/>
    </marker>
    <marker id="arrow-dashed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,1 L9,5 L0,9 Z" fill="#22d3ee"/>
    </marker>
    <linearGradient id="grad-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1b2e"/>
      <stop offset="100%" stop-color="#0f1023"/>
    </linearGradient>
    <linearGradient id="g-teal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <linearGradient id="g-blue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="g-indigo" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="g-violet" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="g-gray" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#475569"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
    <linearGradient id="g-green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>

  <style>
    .page-title { font-family: system-ui, -apple-system, sans-serif; font-size: 22px; font-weight: 700; fill: #f1f5f9; }
    .page-subtitle { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; fill: #64748b; }
    .node-title { font-family: system-ui, -apple-system, sans-serif; font-size: 15px; font-weight: 700; fill: #ffffff; }
    .node-subtitle { font-family: system-ui, -apple-system, sans-serif; font-size: 11px; fill: #e0e7ff; }
    .node-label { font-family: system-ui, -apple-system, sans-serif; font-size: 10px; fill: #93c5fd; }
    .node-code { font-family: "Consolas", "SF Mono", "Fira Code", monospace; font-size: 9px; fill: #bfdbfe; }
    .node-info { font-family: system-ui, -apple-system, sans-serif; font-size: 10px; fill: #a7f3d0; }
    .arrow-label { font-family: system-ui, -apple-system, sans-serif; font-size: 10px; fill: #94a3b8; }
    .arrow-label-dash { font-family: system-ui, -apple-system, sans-serif; font-size: 10px; fill: #22d3ee; }
    .arrow-label-solid { font-family: system-ui, -apple-system, sans-serif; font-size: 10px; fill: #94a3b8; }
    .legend-title { font-family: system-ui, -apple-system, sans-serif; font-size: 11px; font-weight: 600; fill: #cbd5e1; }
    .node:hover { filter: brightness(1.12); cursor: pointer; }
    .divider { font-family: system-ui, -apple-system, sans-serif; font-size: 10px; fill: #475569; }
  </style>

  <rect width="1000" height="800" fill="url(#grad-bg)"/>
  <rect width="1000" height="800" fill="url(#grid)" opacity="0.25"/>

  <!-- Page Header -->
  <text x="500" y="28" text-anchor="middle" class="page-title">monorepo-dev · 依赖拓扑图</text>
  <text x="500" y="46" text-anchor="middle" class="page-subtitle">tsconfig 项目引用 + npm Workspace 依赖 · 有向无环图</text>

  <!-- ═══ ROOT NODE ═══ -->
  <g class="node">
    <rect x="350" y="60" width="300" height="78" rx="10" ry="10" fill="url(#g-gray)" filter="url(#shadow)"/>
    <rect x="350" y="60" width="6" height="78" rx="3" ry="3" fill="#94a3b8" opacity="0.5"/>
    <text x="420" y="86" class="node-title" font-size="14">root tsconfig.json</text>
    <text x="420" y="106" class="node-label">references all 4 packages</text>
    <text x="420" y="122" class="node-label" fill="#64748b">orchestrates tsc -b build order</text>
  </g>

  <!-- ═══ TYPES ═══ -->
  <g class="node">
    <rect x="70" y="190" width="270" height="170" rx="10" ry="10" fill="url(#g-teal)" filter="url(#shadow)"/>
    <rect x="70" y="190" width="6" height="170" rx="3" ry="3" fill="#38bdf8" opacity="0.5"/>
    <text x="90" y="216" class="node-title">skillpack-types</text>
    <text x="90" y="238" class="node-subtitle">类型系统 + 构建函数</text>
    <line x1="90" y1="250" x2="320" y2="250" stroke="#7dd3fc" stroke-width="0.5" opacity="0.3"/>
    <text x="92" y="268" class="node-label">tsconfig  —</text>
    <text x="92" y="284" class="node-label">npm  —</text>
    <text x="92" y="308" class="node-label" fill="#7dd3fc" font-style="italic">Exports:</text>
    <text x="92" y="324" class="node-code">types · createSkill · createAgent</text>
    <text x="92" y="340" class="node-code">createBatch · mapWork · edge</text>
  </g>

  <!-- ═══ COMMON ═══ -->
  <g class="node">
    <rect x="660" y="190" width="270" height="170" rx="10" ry="10" fill="url(#g-blue)" filter="url(#shadow)"/>
    <rect x="660" y="190" width="6" height="170" rx="3" ry="3" fill="#60a5fa" opacity="0.5"/>
    <text x="680" y="216" class="node-title">skillpack-common</text>
    <text x="680" y="238" class="node-subtitle">校验 / 排序 / 图遍历</text>
    <line x1="680" y1="250" x2="910" y2="250" stroke="#93c5fd" stroke-width="0.5" opacity="0.3"/>
    <text x="682" y="268" class="node-label">tsconfig  → types</text>
    <text x="682" y="284" class="node-label">npm  skillpack-types</text>
    <text x="682" y="308" class="node-label" fill="#93c5fd" font-style="italic">Exports:</text>
    <text x="682" y="324" class="node-code">validateStep · resolveStepOrder</text>
    <text x="682" y="340" class="node-code">(Kahn) · walkGraph</text>
  </g>

  <!-- ═══ BUILD ═══ -->
  <g class="node">
    <rect x="70" y="450" width="270" height="170" rx="10" ry="10" fill="url(#g-indigo)" filter="url(#shadow)"/>
    <rect x="70" y="450" width="6" height="170" rx="3" ry="3" fill="#818cf8" opacity="0.5"/>
    <text x="90" y="476" class="node-title">skillpack-build</text>
    <text x="90" y="498" class="node-subtitle">打包器 + CLI</text>
    <line x1="90" y1="510" x2="320" y2="510" stroke="#a5b4fc" stroke-width="0.5" opacity="0.3"/>
    <text x="92" y="528" class="node-label">tsconfig  → types, → common</text>
    <text x="92" y="544" class="node-label">npm  skillpack-types, skillpack-common</text>
    <text x="92" y="568" class="node-label" fill="#a5b4fc" font-style="italic">Exports:</text>
    <text x="92" y="584" class="node-code">buildPipeline · defineConfig</text>
    <text x="92" y="600" class="node-code">renderStep · bin: skillpack CLI</text>
  </g>

  <!-- ═══ VALIDATE ═══ -->
  <g class="node">
    <rect x="660" y="450" width="270" height="170" rx="10" ry="10" fill="url(#g-violet)" filter="url(#shadow)"/>
    <rect x="660" y="450" width="6" height="170" rx="3" ry="3" fill="#a78bfa" opacity="0.5"/>
    <text x="680" y="476" class="node-title">skillpack-validate</text>
    <text x="680" y="498" class="node-subtitle">校验 CLI</text>
    <line x1="680" y1="510" x2="910" y2="510" stroke="#c4b5fd" stroke-width="0.5" opacity="0.3"/>
    <text x="682" y="528" class="node-label">tsconfig  → types, → common</text>
    <text x="682" y="544" class="node-label">npm  skillpack-types, skillpack-common</text>
    <text x="682" y="568" class="node-label" fill="#c4b5fd" font-style="italic">Exports:</text>
    <text x="682" y="584" class="node-code">validatePipeline</text>
  </g>

  <!-- ═══ DEMO ═══ -->
  <g class="node">
    <rect x="240" y="670" width="520" height="85" rx="10" ry="10" fill="url(#g-green)" filter="url(#shadow)"/>
    <rect x="240" y="670" width="6" height="85" rx="3" ry="3" fill="#34d399" opacity="0.5"/>
    <text x="270" y="695" class="node-title">@skillpack/demo</text>
    <text x="270" y="716" class="node-info">文件: skillpack.config.ts, skill.ts</text>
    <text x="270" y="738" class="node-info">npm: skillpack-types, skillpack-common, skillpack-build, skillpack-validate + tsx (dev)</text>
  </g>

  <!-- ═══ ARROWS: ROOT → PACKAGES ═══ (solid = tsconfig) -->

  <!-- Root → Types -->
  <path d="M 500 138 C 420 155, 320 170, 210 183" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arrow-solid)"/>
  <text x="355" y="168" text-anchor="middle" class="arrow-label-solid">tsconfig ref</text>

  <!-- Root → Common -->
  <path d="M 500 138 C 580 155, 680 170, 790 183" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arrow-solid)"/>
  <text x="645" y="168" text-anchor="middle" class="arrow-label-solid">tsconfig ref</text>

  <!-- Root → Build -->
  <path d="M 480 138 C 420 280, 310 380, 210 443" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arrow-solid)"/>
  <text x="355" y="300" text-anchor="middle" class="arrow-label-solid">tsconfig ref</text>

  <!-- Root → Validate -->
  <path d="M 520 138 C 580 280, 690 380, 790 443" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arrow-solid)"/>
  <text x="645" y="300" text-anchor="middle" class="arrow-label-solid">tsconfig ref</text>

  <!-- ═══ ARROWS: COMMON → TYPES ═══ (solid tsconfig + dashed npm) -->

  <path d="M 655 263 L 352 263" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arrow-solid)"/>
  <path d="M 655 283 L 352 283" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="5,4" fill="none" marker-end="url(#arrow-dashed)"/>
  <text x="503" y="258" text-anchor="middle" class="arrow-label-solid">tsconfig ref</text>
  <text x="503" y="296" text-anchor="middle" class="arrow-label-dash">npm dep</text>

  <!-- ═══ ARROWS: BUILD → TYPES ═══ (solid + dashed, vertical) -->

  <path d="M 197 450 L 197 372" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arrow-solid)"/>
  <path d="M 217 450 L 217 372" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="5,4" fill="none" marker-end="url(#arrow-dashed)"/>
  <text x="207" y="418" text-anchor="middle" class="arrow-label-solid">tsconfig ref</text>
  <text x="207" y="435" text-anchor="middle" class="arrow-label-dash">npm dep</text>

  <!-- ═══ ARROWS: BUILD → COMMON ═══ (solid + dashed, diagonal) -->

  <path d="M 340 503 C 550 503, 700 430, 785 368" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arrow-solid)"/>
  <path d="M 340 523 C 550 523, 700 450, 785 380" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="5,4" fill="none" marker-end="url(#arrow-dashed)"/>
  <text x="570" y="470" text-anchor="middle" class="arrow-label-solid">tsconfig ref</text>
  <text x="570" y="505" text-anchor="middle" class="arrow-label-dash">npm dep</text>

  <!-- ═══ ARROWS: VALIDATE → TYPES ═══ (solid + dashed, diagonal) -->

  <path d="M 660 503 C 500 503, 400 430, 345 368" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arrow-solid)"/>
  <path d="M 660 523 C 500 523, 400 450, 345 380" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="5,4" fill="none" marker-end="url(#arrow-dashed)"/>
  <text x="500" y="470" text-anchor="middle" class="arrow-label-solid">tsconfig ref</text>
  <text x="500" y="505" text-anchor="middle" class="arrow-label-dash">npm dep</text>

  <!-- ═══ ARROWS: VALIDATE → COMMON ═══ (solid + dashed, vertical) -->

  <path d="M 783 450 L 783 372" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arrow-solid)"/>
  <path d="M 803 450 L 803 372" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="5,4" fill="none" marker-end="url(#arrow-dashed)"/>
  <text x="793" y="418" text-anchor="middle" class="arrow-label-solid">tsconfig ref</text>
  <text x="793" y="435" text-anchor="middle" class="arrow-label-dash">npm dep</text>

  <!-- ═══ ARROWS: DEMO → PACKAGES ═══ (dashed = npm only) -->

  <!-- Demo → Build -->
  <path d="M 290 669 L 210 632" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="5,4" fill="none" marker-end="url(#arrow-dashed)"/>
  <text x="245" y="655" text-anchor="middle" class="arrow-label-dash">npm dep</text>

  <!-- Demo → Validate -->
  <path d="M 710 669 L 790 632" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="5,4" fill="none" marker-end="url(#arrow-dashed)"/>
  <text x="755" y="655" text-anchor="middle" class="arrow-label-dash">npm dep</text>

  <!-- Demo → Common (curves around validate right side) -->
  <path d="M 570 669 C 940 669, 940 460, 790 372" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="5,4" fill="none" marker-end="url(#arrow-dashed)"/>
  <text x="890" y="530" text-anchor="middle" class="arrow-label-dash">npm dep</text>

  <!-- ═══ BUILD ORDER TIMELINE ═══ -->

  <line x1="40" y1="773" x2="960" y2="773" stroke="#334155" stroke-width="1" stroke-dasharray="4,4"/>

  <text x="40" y="790" class="legend-title" font-size="12">Build Order（tsc -b）</text>

  <!-- Phase 1 -->
  <rect x="120" y="778" width="150" height="20" rx="4" ry="4" fill="#0ea5e9" opacity="0.9"/>
  <text x="195" y="792" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#fff">Phase 1: types</text>

  <path d="M 270 788 L 296 788" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arrow-solid)"/>

  <!-- Phase 2 -->
  <rect x="300" y="778" width="150" height="20" rx="4" ry="4" fill="#2563eb" opacity="0.9"/>
  <text x="375" y="792" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#fff">Phase 2: common</text>

  <path d="M 450 788 L 476 788" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arrow-solid)"/>

  <!-- Phase 3 -->
  <rect x="480" y="778" width="200" height="20" rx="4" ry="4" fill="#6366f1" opacity="0.9"/>
  <text x="580" y="792" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#fff">Phase 3: build + validate (parallel)</text>

  <path d="M 680 788 L 706 788" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arrow-solid)"/>

  <!-- Phase 4 -->
  <rect x="710" y="778" width="220" height="20" rx="4" ry="4" fill="#10b981" opacity="0.9"/>
  <text x="820" y="792" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#fff">Phase 4: demo (tsx, no build)</text>

</svg>
